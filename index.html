                        if (data.updatedAt && (now - data.updatedAt < 86400000)) {
                            rooms.push({ id: doc.id, updatedAt: data.updatedAt });
                        }

                    rooms.sort((a, b) => b.updatedAt - a.updatedAt);

                        {canControl && (phase !== 'intro' || step > 0 || decadeIndex > 0) && (
                            <button onClick={() => { triggerVibration(10); const trigs = getNewTriggers(); setPhase('intro'); setStep(0); setDecadeIndex(0); setMiraculousTriggers(trigs); pushUpdate({ phase: 'intro', step: 0, decadeIndex: 0, miraculousTriggers: trigs, showMiraculous: false }); }} className="group bg-transparent hover:bg-white/50 text-[#8b1a1a] w-full py-3.5 rounded-2xl font-bold text-[11px] uppercase tracking-widest transition-all active:scale-95 flex items-center justify-center border border-[#d2c5aa] hover:border-[#8b1a1a] shadow-sm hover:shadow-md">
                                <div className="mr-2 transform group-hover:-rotate-180 transition-transform duration-500"><Icon name="refresh" className="w-4 h-4" /></div>
                                {t('btnRestart')}
                            </button>
                        )}
                    </div>

                    {/* Aktivne sobe */}
                    {!isPrivateMode && activeRooms.length > 0 && (
                        <div className="w-full mt-6 bg-white/60 backdrop-blur-md p-5 rounded-[1.5rem] border border-[#d4af37]/30 shadow-sm relative overflow-hidden animate-slide-up" style={{ animationDelay: '0.4s' }}>
                            <p className="text-[10px] text-[#8b1a1a] uppercase tracking-widest font-bold flex items-center justify-center gap-2 mb-4"><span className="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_5px_#22c55e] animate-pulse"></span>{t('activeRooms')} ({activeRooms.length})</p>
                            <div className="flex flex-wrap justify-center gap-2.5 max-h-[140px] overflow-y-auto hide-scrollbar p-1">
                                {activeRooms.map(room => {
                                    const mins = Math.floor((Date.now() - room.updatedAt) / 60000);
                                    let timeStr = mins < 1 ? t('justNow') : `${mins}m`;
                                    if (mins >= 60) timeStr = `${Math.floor(mins/60)}h`;
                                    const isSelected = room.id === roomName;
                                    return (
                                        <div key={room.id} className={`flex items-stretch rounded-full shadow-sm transition-all border ${isSelected ? 'bg-[#121c33] text-[#d4af37] border-[#121c33] scale-105 shadow-md' : 'bg-white text-[#6d5a42] border-[#e8dfc8] hover:border-[#d4af37]'}`}>
                                            <button onClick={() => { triggerVibration(10); setRoomName(room.id); }} className="text-[10px] md:text-xs px-3.5 py-2 font-bold flex items-center gap-2 active:scale-95">{room.id} <span className="opacity-50 text-[9px] font-normal">{timeStr}</span></button>
                                            {isMasterAdmin && (<button onClick={(e) => { e.stopPropagation(); triggerVibration(15); deleteRoom(room.id); }} className={`pr-3 pl-1.5 py-1 flex items-center justify-center transition-colors active:scale-90 ${isSelected ? 'text-[#d4af37] hover:text-red-400' : 'text-red-400 hover:text-red-600'}`} title="Trajno izbriši sobo"><Icon name="trash" className="w-4 h-4" /></button>)}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}
                </div>
            );

            const renderPrayerContent = () => {
                const p = PRAYERS[safeLang];
                const currentMysteryText = MYSTERIES[safeMysteryType][safeLang]?.[decadeIndex] || "";
                const isInsertLanguage = safeLang === 'sl' || safeLang === 'de';

                if (phase === 'finished') {
                    return (
                        <div className="text-center py-12 px-6 animate-slide-up flex flex-col justify-center h-full">
                            <div className="w-24 h-24 bg-[#121c33] rounded-full flex items-center justify-center mx-auto mb-6 shadow-xl border-[4px] border-[#d4af37] text-[#d4af37]"><Icon name="check" className="w-12 h-12" /></div>
                            <h2 className="text-4xl font-serif-holy font-bold text-[#8b1a1a] mb-3 uppercase tracking-tight">{t('thanks')}</h2>
                            <p className="text-[#3e2723] mb-10 text-lg font-medium italic">{t('finished')}</p>
                            <button onClick={() => { triggerVibration(10); setView('menu'); if(canControl){ const trigs = getNewTriggers(); setPhase('intro'); setStep(0); setDecadeIndex(0); setMiraculousTriggers(trigs); pushUpdate({ phase: 'intro', step: 0, decadeIndex: 0, miraculousTriggers: trigs, showMiraculous: false }); } }} className="group bg-gradient-to-b from-[#121c33] to-[#0a0f1c] hover:from-[#1a294c] hover:to-[#121c33] text-[#d4af37] w-full max-w-xs py-4 rounded-xl font-serif-holy font-bold text-lg shadow-lg transition flex items-center justify-center mx-auto border-b-4 border-[#000]"><div className="mr-3 transform group-hover:rotate-180 transition-transform duration-500"><Icon name="refresh" /></div>{t('btnMenu')}</button>
                        </div>
                    );
                }

                let title = "";
                let content = null;
                let subtitle = "";

                const prayerDict = UI_DICT[safeLang] || UI_DICT['sl'];

                if (phase === 'intro') {
                    subtitle = prayerDict.intro;
                } else if (phase === 'outro') {
                    subtitle = prayerDict.outro;
                } else if (phase === 'decades') {
                    if (isInsertLanguage) {
                        subtitle = `${decadeIndex + 1}. ${prayerDict.mystery}`;
                    } else {
                        subtitle = `${decadeIndex + 1}. ${prayerDict.mystery}: ${currentMysteryText}`;
                    }
                }

                if (phase === 'intro') {
                    if (step === 0) {
                        title = p.credoTitle;
                        content = <p className="text-base md:text-lg leading-relaxed font-serif-holy font-semibold text-[#2c1810]">{p.credo}</p>;
                    } else if (step === 1) {
                        title = p.ocenasTitle;
                        content = <p className="text-base md:text-lg leading-relaxed font-serif-holy font-semibold text-[#2c1810]">{p.ocenas}</p>;
                    } else if (step >= 2 && step <= 4) {
                        title = p.zdravaTitle;
                        content = <p className="text-base md:text-lg leading-relaxed font-serif-holy font-semibold text-[#2c1810]">{p.zdrava1}{safeLang === 'sl' ? ", " : ""}{safeLang === 'sl' && <span className="text-[#8b1a1a] bg-[#fcfaf5] px-1 rounded underline decoration-[#d4af37] decoration-2 underline-offset-4 font-bold">{INTRO_INSERTS[safeMysteryType][step - 2]}</span>}{p.zdrava2}</p>;
                    } else if (step === 5) {
                        title = p.slavaTitle;
                        content = <p className="text-base md:text-lg leading-relaxed font-serif-holy font-semibold text-[#2c1810]">{p.slava}</p>;
                    }
                } else if (phase === 'decades') {
                    const tClass = showMysteryImage ? "text-lg md:text-xl leading-relaxed font-serif-holy font-medium text-[#fcfaf5] drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]" : "text-base md:text-lg leading-relaxed font-serif-holy font-semibold text-[#2c1810]";
                    const hlClass = showMysteryImage ? "text-[#d4af37] px-1 rounded font-bold underline decoration-[#d4af37] decoration-2 underline-offset-4 bg-black/40 backdrop-blur-sm shadow-sm" : "text-[#8b1a1a] bg-[#fcfaf5] px-1 rounded underline decoration-[#d4af37] decoration-2 underline-offset-4 font-bold";

                    if (step === 0) { title = p.ocenasTitle; content = <p className={tClass}>{p.ocenas}</p>; } 
                    else if (step >= 1 && step <= 10) { title = p.zdravaTitle; content = <p className={tClass}>{p.zdrava1}{isInsertLanguage ? ", " : ""}{isInsertLanguage && <span className={hlClass}>{currentMysteryText}</span>}{p.zdrava2}</p>; } 
                    else if (step === 11) { title = p.slavaTitle; content = <p className={tClass}>{p.slava}</p>; } 
                    else if (step === 12) { title = p.fatimaTitle; content = <p className={tClass}>{p.fatima}</p>; }
                } else if (phase === 'outro') {
                    if (step === 0) { title = p.benedictTitle; content = <p className="text-base md:text-lg leading-relaxed font-serif-holy font-semibold text-[#2c1810]">{p.benedict}</p>; } 
                    else if (step === 1) { title = p.ocenasTitle; content = <p className="text-base md:text-lg leading-relaxed font-serif-holy font-semibold text-[#2c1810]">{p.ocenas}</p>; } 
                    else if (step >= 2 && step <= 4) { title = p.zdravaTitle; content = <p className="text-base md:text-lg leading-relaxed font-serif-holy font-semibold text-[#2c1810]">{p.zdrava1}{p.zdrava2}</p>; } 
                    else if (step === 5) { title = p.slavaTitle; content = <p className="text-base md:text-lg leading-relaxed font-serif-holy font-semibold text-[#2c1810]">{p.slava}</p>; } 
                    else if (step === 6) { title = p.salveTitle; content = <p className="text-base md:text-lg leading-relaxed font-serif-holy font-semibold text-[#2c1810]">{p.salve}</p>; } 
                    else if (step === 7) { title = p.michaelTitle; content = <p className="text-base md:text-lg leading-relaxed font-serif-holy font-semibold text-[#2c1810]">{p.michael}</p>; }
                }

                let beadArray = [];
                if (phase === 'intro') beadArray = Array.from({ length: 6 });
                else if (phase === 'decades') beadArray = Array.from({ length: 13 });
                else if (phase === 'outro') beadArray = Array.from({ length: 8 });

                return (
                    <div className="flex flex-col h-full animate-fade-in w-full">
                        
                        <div className="w-full flex justify-between items-center mb-3 mt-1">
                            <button onClick={() => { triggerVibration(10); setView('menu'); }} className="w-10 h-10 bg-[#fcfaf5] rounded-full shadow-sm flex items-center justify-center text-[#8b1a1a] hover:text-[#121c33] transform transition-all active:scale-90 border border-[#d2c5aa] flex-shrink-0 relative z-[60]" aria-label="Nazaj na meni"><Icon name="book" className="w-5 h-5" /></button>

                            <div className="flex flex-col items-center gap-1.5 relative z-[60]">
                                <div className="flex gap-1.5">
                                    {[0, 1, 2, 3, 4].map(i => {
                                        let stateClass = 'w-3 bg-[#d2c5aa]/60';
                                        if (phase === 'outro' || (phase === 'decades' && i < decadeIndex)) stateClass = 'w-3 bg-[#d4af37]';
                                        else if (phase === 'decades' && i === decadeIndex) stateClass = 'w-6 bg-[#8b1a1a] shadow-sm';
                                        return <div key={`d-${i}`} className={`h-1.5 rounded-sm transition-all duration-500 ${stateClass}`} />;
                                    })}
                                </div>
                                <div className="flex gap-1 items-center">
                                    {beadArray.map((_, i) => {
                                        let isLarge = false;
                                        if (phase === 'intro') isLarge = (i === 0 || i === 1 || i === 5);
                                        else if (phase === 'decades') isLarge = (i === 0 || i === 11 || i === 12);
                                        else if (phase === 'outro') isLarge = (i === 0 || i === 1 || i === 5 || i === 6 || i === 7);
                                        return <div key={`b-${i}`} className={`rounded-full transition-all duration-300 ${isLarge ? 'w-1.5 h-1.5' : 'w-1 h-1'} ${i === step ? 'bg-[#121c33] ring-1 ring-[#d4af37] ring-offset-1 ring-offset-[#f6f3eb] scale-125' : i < step ? 'bg-[#8b1a1a]/60' : 'bg-[#d2c5aa]'}`} />;
                                    })}
                                </div>
                            </div>

                            <div className="w-10 h-10 flex-shrink-0 flex justify-end relative z-[60]">
                                {phase === 'decades' && (<button onClick={() => { triggerVibration(10); setShowMysteryImage(!showMysteryImage); }} className={`w-10 h-10 rounded-full shadow-sm flex items-center justify-center transform transition-all active:scale-90 border ${showMysteryImage ? 'bg-[#121c33] text-[#d4af37] border-[#121c33]' : 'bg-[#fcfaf5] text-[#8b1a1a] hover:text-[#121c33] border-[#d2c5aa]'}`} aria-label="Prikaži sliko"><Icon name="eye" className="w-5 h-5" /></button>)}
                            </div>
                        </div>
                        
                        {!showMysteryImage ? (
                            <div className="bg-[#fdfbf7] rounded-xl p-5 md:p-8 pt-6 md:pt-8 pb-36 md:pb-40 shadow-xl border border-[#d4af37]/40 relative overflow-y-auto hide-scrollbar flex-grow flex flex-col justify-start z-10">
                                <div className="absolute top-0 left-0 w-16 h-16 border-t-4 border-l-4 border-[#d4af37]/20 rounded-tl-xl m-2 pointer-events-none"></div>
                                <div className="absolute top-0 right-0 w-16 h-16 border-t-4 border-r-4 border-[#d4af37]/20 rounded-tr-xl m-2 pointer-events-none"></div>

                                <div className="text-center mb-4 flex flex-col items-center relative z-10">
                                    <span className="px-3 py-1 bg-[#121c33] text-[#d4af37] rounded-sm text-[9px] font-bold mb-3 uppercase tracking-[0.2em] shadow-sm">{subtitle}</span>
                                    <h2 className="text-xl md:text-2xl font-serif-holy font-bold text-[#8b1a1a] uppercase tracking-tight drop-shadow-sm">{title}</h2>
                                </div>
                                
                                <div className="block text-center relative z-10 mt-1">
                                    <div className="animate-fade-in" key={`${phase}-${decadeIndex}-${step}-${safeLang}`}>{content}</div>
                                </div>

                                {/* Prikaz osebnega namena molitve na dnu */}
                                {!isPrivateMode && intention && intention.trim() !== '' && (
                                    <div className="mt-8 pt-5 border-t border-[#e8dfc8]/50 text-center relative z-10 animate-fade-in">
                                        <span className="text-[9px] text-[#6d5a42] font-bold uppercase tracking-[0.2em] mb-1 block">{t('intentLabel')}</span>
                                        <p className="text-[#8b1a1a] font-serif-holy font-semibold italic text-base md:text-lg px-2">"{intention}"</p>
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="rounded-xl shadow-2xl relative overflow-hidden flex-grow flex flex-col justify-center items-center border border-[#d4af37]/50 animate-fade-in bg-black z-10">
                                {MYSTERY_IMAGES[safeMysteryType]?.[decadeIndex] ? <img src={MYSTERY_IMAGES[safeMysteryType][decadeIndex]} className="absolute inset-0 w-full h-full object-cover animate-fade-in" /> : <div className="absolute inset-0 bg-gradient-to-br from-[#121c33] to-[#0a0f1c]"></div>}
                                <div className="absolute top-0 left-0 w-full h-24 bg-gradient-to-b from-black/40 to-transparent pointer-events-none"></div>
                                <div className="absolute bottom-0 left-0 w-full h-32 bg-gradient-to-t from-black/50 to-transparent pointer-events-none"></div>
                            </div>
                        )}

                        {canControl ? (
                            <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-lg px-4 md:px-6 flex justify-between items-end pointer-events-none z-50">
                                <button onClick={() => { triggerVibration(10); handlePrevStep(); }} className="w-12 h-12 bg-[#fcfaf5] rounded-full shadow-lg flex items-center justify-center text-[#6d5a42] hover:text-[#8b1a1a] transform transition-all active:scale-90 border border-[#d2c5aa] pointer-events-auto mb-2 md:mb-4" aria-label="Nazaj"><Icon name="arrowLeft" className="w-6 h-6" /></button>
                                <button onClick={() => { triggerVibration(15); handleNextStep(); }} className="w-20 h-20 md:w-24 md:h-24 rounded-full shadow-[0_10px_25px_rgba(0,0,0,0.3)] flex items-center justify-center text-[#d4af37] transform transition-all active:scale-95 border-[4px] border-[#d4af37] group pointer-events-auto relative overflow-hidden bg-gradient-to-br from-[#8b1a1a] to-[#4a0e0e]">
                                    {CUSTOM_BEAD_IMAGE ? <img src={CUSTOM_BEAD_IMAGE} alt="Naprej" className="absolute inset-0 w-full h-full object-cover rounded-full" /> : <span className="text-4xl md:text-5xl drop-shadow-md group-hover:scale-110 group-active:scale-90 transition-transform duration-300 font-serif-holy relative z-10">✟</span>}
                                    {CUSTOM_BEAD_IMAGE && <div className="absolute inset-0 bg-black/10 group-active:bg-black/30 transition-colors pointer-events-none rounded-full"></div>}
                                </button>
                            </div>
                        ) : (
                            <div className="fixed bottom-8 left-1/2 -translate-x-1/2 w-full max-w-lg px-4 flex justify-center pointer-events-none z-50">
                                <div className="bg-[#121c33]/90 backdrop-blur-md text-[#d4af37] px-6 py-3 rounded-full shadow-lg border border-[#d4af37]/30 text-[10px] md:text-xs font-bold uppercase tracking-widest flex items-center gap-2">
                                    <span className="w-2 h-2 rounded-full bg-[#d4af37] shadow-[0_0_5px_#d4af37]"></span>
                                    {isPrivateMode ? t('private') : t('adminLeads')}
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className={`min-h-screen flex flex-col items-center relative ${view === 'menu' ? 'pb-12' : 'pb-4'}`} onTouchStart={view === 'prayer' ? onTouchStart : undefined} onTouchEnd={view === 'prayer' ? onTouchEndHandler : undefined}>
                    
                    {/* DISKRETEN STATUS POVEZAVE V KOTU */}
                    {!isPrivateMode && view === 'menu' && (
                        <div className="absolute top-4 right-5 z-50 flex items-center gap-1.5 opacity-40 hover:opacity-100 transition-opacity duration-300">
                            <span className={`w-1.5 h-1.5 rounded-full ${user ? 'bg-green-500 shadow-[0_0_4px_#22c55e]' : 'bg-red-500'}`}></span>
                            <span className="text-[8px] font-bold uppercase tracking-widest text-[#6d5a42]">{user ? t('connected') : t('offline')}</span>
                        </div>
                    )}

                    <div className={`w-full max-w-lg flex flex-col px-4 md:px-6 ${view === 'menu' ? 'mt-0 md:mt-2' : 'mt-2 h-[95vh]'}`}>
                        {view === 'menu' ? renderMainMenu() : renderPrayerContent()}
                    </div>

                    {/* DISKRETNI JEZIKI MENIJA NA DNU */}
                    {view === 'menu' && (
                        <div className="mt-auto pt-8 pb-6 px-4 w-full max-w-md flex flex-col items-center gap-4">
                            <div className="text-[#8b1a1a] text-[10px] font-bold text-center uppercase tracking-[0.3em] opacity-60 leading-loose">
                                Ave Maria ✟ Gratia Plena<br/>Dominus Tecum
                            </div>
                            <div className="flex gap-4 items-center justify-center opacity-40 hover:opacity-100 transition-opacity duration-300 mt-2">
                                {['sl', 'en', 'de', 'it', 'la'].map(l => (
                                    <button key={l} onClick={() => { triggerVibration(10); setUiLang(l); }} className={`text-[9px] font-bold uppercase tracking-widest transition-colors ${uiLang === l ? 'text-[#8b1a1a] scale-110' : 'text-[#6d5a42] hover:text-[#121c33]'}`}>{l}</button>
                                ))}
                            </div>
                        </div>
                    )}

                    {showMiraculous && (
                        <div className="fixed inset-0 bg-[#121c33]/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4 animate-fade-in">
                            <div className="bg-[#fdfbf7] p-8 rounded-2xl max-w-sm w-full shadow-2xl border-2 border-[#d4af37] text-center relative overflow-hidden transform transition-all animate-slide-up">
                                <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-[#d4af37] via-[#f4e0aa] to-[#d4af37]"></div>
                                <div className="w-20 h-28 mx-auto mb-6 bg-gradient-to-br from-[#121c33] to-[#0a0f1c] rounded-[40%] border-[3px] border-[#d4af37] flex items-center justify-center shadow-lg relative overflow-hidden">
                                    {MIRACULOUS_MEDAL_IMAGE ? <img src={MIRACULOUS_MEDAL_IMAGE} alt="Čudodelna svetinja" className="w-full h-full object-cover" /> : <span className="text-4xl filter drop-shadow-md">🏅</span>}
                                    <div className="absolute inset-0 shadow-[inset_0_0_15px_rgba(0,0,0,0.5)] rounded-[40%] pointer-events-none"></div>
                                </div>
                                <h3 className="text-xl font-serif-holy font-bold text-[#8b1a1a] mb-4 uppercase tracking-wider">{PRAYERS[safeLang].miraculousTitle}</h3>
                                <p className="text-lg md:text-xl font-serif-holy font-bold text-[#2c1810] mb-8 italic px-2">"{PRAYERS[safeLang].miraculous}"</p>
                                
                                {canControl ? (
                                    <button onClick={() => { triggerVibration(10); setShowMiraculous(false); pushUpdate({ showMiraculous: false }); }} className="bg-gradient-to-b from-[#8b1a1a] to-[#5c0e0e] text-[#f4e0aa] w-full py-4 rounded-xl font-serif-holy font-bold text-lg shadow-lg hover:from-[#a01e1e] hover:to-[#731212] transition-colors border-b-4 border-[#3e0808] active:translate-y-1 active:border-b-0">AMEN</button>
                                ) : (
                                    <div className="text-[#8b1a1a] font-bold text-xs uppercase tracking-widest">{t('waitLeader')}</div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
