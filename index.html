            zalostni: ["ki nam utrdi spomin", "ki nam razsvetli pamet", "ki nam omeči voljo"],
            castitljivi: ["ki nam vodi naše misli", "ki nam vodi naše besede", "ki nam vodi naša dejanja"]
        };

        // --- IMAGINES ET ICONES ---
        const Icon = ({ name, className = "" }) => {
            const paths = {
                play: "M5 3l14 9-14 9V3z",
                refresh: "M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15",
                check: "M20 6L9 17l-5-5",
                book: "M4 19.5A2.5 2.5 0 016.5 17H20M4 19.5A2.5 2.5 0 006.5 22H20M4 19.5V3a1 1 0 011-1h15a1 1 0 011 1v19a1 1 0 01-1 1H6.5a2.5 2.5 0 01-2.5-2.5z",
                dices: "M3 3h7v7H3z M14 3h7v7h-7z M3 14h7v7H3z M14 14h7v7h-7z",
                arrowLeft: "M15 19l-7-7 7-7",
                arrowRight: "M9 5l7 7-7 7",
                eye: "M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z M12 15a3 3 0 100-6 3 3 0 000 6z",
                wifi: "M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z",
                user: "M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2 M12 11a4 4 0 100-8 4 4 0 000 8z",
                users: "M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2 M9 11a4 4 0 100-8 4 4 0 000 8z M23 21v-2a4 4 0 00-3-3.87 M16 3.13a4 4 0 010 7.75",
                lock: "M19 11H5a2 2 0 00-2 2v7a2 2 0 002 2h14a2 2 0 002-2v-7a2 2 0 00-2-2z M7 11V7a5 5 0 0110 0v4",
                unlock: "M19 11H5a2 2 0 00-2 2v7a2 2 0 002 2h14a2 2 0 002-2v-7a2 2 0 00-2-2z M7 11V7a5 5 0 019.9-1",
                globe: "M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10zm-8.8-9.5h4.156c.214-3.666 1.157-6.9 2.644-9.355C6.467 4.542 3.69 7.42 3.2 12.5zm15.6 0h-4.156c-.214-3.666-1.157-6.9-2.644-9.355C17.533 4.542 20.31 7.42 20.8 12.5zm-6.2 0H10.2c.224 4.02 1.258 7.514 2.8 9.94.408-.636.78-1.34 1.116-2.095.827-1.848 1.484-4.246 1.684-7.845z",
                home: "M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z M9 22V12h6v10",
                star: "M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
            };
            return (
                <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <path d={paths[name]} />
                </svg>
            );
        };

        const getMysteryForToday = () => {
            const day = new Date().getDay(); 
            switch(day) {
                case 1: case 6: return 'veseli';
                case 2: case 5: return 'zalostni';
                case 4: return 'svetli';
                case 3: case 0: default: return 'castitljivi';
            }
        };

        const getNewTriggers = () => {
            const triggers = new Set();
            while(triggers.size < 3) {
                triggers.add(Math.floor(Math.random() * 63) + 1); 
            }
            return Array.from(triggers);
        };

        function App() {
            // Lokalno Stanje
            const [view, setView] = useState('menu'); // Strogo lokalno!
            const [showMysteryImage, setShowMysteryImage] = useState(false); 
            
            // NOVO: Samodejen skok na vrh ob menjavi zaslona (popravi težavo na telefonu)
            useEffect(() => {
                window.scrollTo(0, 0);
            }, [view]);
            
            // Zasebni / Skupni način
            const [isPrivateMode, setIsPrivateMode] = useState(() => {
                if (typeof window !== 'undefined' && window.localStorage) {
                    return localStorage.getItem('rosary_private_mode') === 'true';
                }
                return false;
            });
            
            const isPrivateModeRef = useRef(isPrivateMode);
            useEffect(() => {
                isPrivateModeRef.current = isPrivateMode;
            }, [isPrivateMode]);

            // SOBE in Geslo Sobe iz baze
            const [roomName, setRoomName] = useState(() => {
                if (typeof window !== 'undefined' && window.localStorage) {
                    return localStorage.getItem('rosary_room_name') || 'JavnaSoba';
                }
                return 'JavnaSoba';
            });

            useEffect(() => {
                if (typeof window !== 'undefined' && window.localStorage) {
                    localStorage.setItem('rosary_room_name', roomName);
                }
            }, [roomName]);

            const [dbAdminCode, setDbAdminCode] = useState(null);

            const lastSharedState = useRef(null);

            const applyState = useCallback((data) => {
                if (!data) return;
                if (data.phase !== undefined) setPhase(data.phase);
                if (data.step !== undefined) setStep(data.step);
                if (data.decadeIndex !== undefined) setDecadeIndex(data.decadeIndex);
                if (data.lang && PRAYERS[data.lang]) setLang(data.lang);
                if (data.mysteryType && MYSTERIES[data.mysteryType]) setMysteryType(data.mysteryType);
                if (Array.isArray(data.miraculousTriggers)) setMiraculousTriggers(data.miraculousTriggers);
                if (data.isRoulettePrayer !== undefined) setIsRoulettePrayer(data.isRoulettePrayer);
                if (data.isRouletteDecade !== undefined) setIsRouletteDecade(data.isRouletteDecade);
                if (data.showMiraculous !== undefined) setShowMiraculous(data.showMiraculous);
            }, []);

            const resetToStart = useCallback(() => {
                setPhase('intro');
                setStep(0);
                setDecadeIndex(0);
                setMiraculousTriggers(getNewTriggers());
                setShowMiraculous(false);
            }, []);

            // Koda uporabnika za vodenje (iz local storage)
            const [leaderCode, setLeaderCode] = useState(() => {
                if (typeof window !== 'undefined' && window.localStorage) {
                    return localStorage.getItem('rosary_leader_code') || '';
                }
                return '';
            });
            
            // Določi, če je trenutni uporabnik voditelj v sobi
            // Pravilo: Če ima soba geslo, se mora ujemati. Če soba nima gesla, postane voditelj kdorkoli prvi vnese geslo.
            const isLeader = leaderCode.trim() !== '' && (!dbAdminCode || leaderCode.trim() === dbAdminCode);
            
            // Dovoljenje za nadzor UI - Voditelj skupine ALI uporaba v zasebnem načinu
            const canControl = isPrivateMode || isLeader;

            useEffect(() => {
                if (typeof window !== 'undefined' && window.localStorage) {
                    localStorage.setItem('rosary_leader_code', leaderCode);
                }
            }, [leaderCode]);

            // Sinhronizirano Stanje
            const [lang, setLang] = useState('sl');
            const [isRoulettePrayer, setIsRoulettePrayer] = useState(false);
            const [isRouletteDecade, setIsRouletteDecade] = useState(false);
            const [mysteryType, setMysteryType] = useState(getMysteryForToday());
            const [phase, setPhase] = useState('intro'); 
            const [decadeIndex, setDecadeIndex] = useState(0); 
            const [step, setStep] = useState(0); 
            const [showMiraculous, setShowMiraculous] = useState(false);
            const [miraculousTriggers, setMiraculousTriggers] = useState([]);

            // Firebase stanje
            const [fbReady, setFbReady] = useState(!!window.Firebase);
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [isCanvasEnv, setIsCanvasEnv] = useState(false);
            const [appId, setAppId] = useState("");
            
            // NOVO: Aktivne sobe
            const [activeRooms, setActiveRooms] = useState([]);

            // Reference za zaznavanje drsenja
            const touchStartX = useRef(null);
            const touchStartY = useRef(null);
            
            // Referenca za zaznavanje prvega nalaganja baze
            const isFirstLoad = useRef(true);

            // Shranjevanje zasebnega napredka
            useEffect(() => {
                if (isPrivateMode && typeof window !== 'undefined' && window.localStorage) {
                    localStorage.setItem('rosary_private_state', JSON.stringify({
                        phase, step, decadeIndex, lang, mysteryType, 
                        miraculousTriggers, isRoulettePrayer, isRouletteDecade, showMiraculous
                    }));
                }
            }, [phase, step, decadeIndex, lang, mysteryType, miraculousTriggers, isRoulettePrayer, isRouletteDecade, showMiraculous, isPrivateMode]);

            // Nalaganje zasebnega napredka ob zagonu (če smo v zasebnem načinu)
            useEffect(() => {
                if (isPrivateMode) {
                    const saved = typeof window !== 'undefined' && window.localStorage ? localStorage.getItem('rosary_private_state') : null;
                    if (saved) {
                        try {
                            applyState(JSON.parse(saved));
                        } catch (e) {
                            resetToStart();
                        }
                    } else {
                        resetToStart();
                    }
                }
                // eslint-disable-next-line react-hooks/exhaustive-deps
            }, []);

            const triggerVibration = useCallback((duration = 15) => {
                if (typeof window !== 'undefined' && window.navigator && window.navigator.vibrate) {
                    try { window.navigator.vibrate(duration); } catch (e) {}
                }
            }, []);

            // Inicializacija Firebase
            useEffect(() => {
                if (fbReady) return;
                const handler = () => setFbReady(true);
                window.addEventListener('firebase-loaded', handler);
                return () => window.removeEventListener('firebase-loaded', handler);
            }, [fbReady]);

            useEffect(() => {
                if (!fbReady) return;
                const { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, getFirestore } = window.Firebase;

                let config;
                let envCanvas = false;
                let id = "";

                if (typeof __firebase_config !== 'undefined') {
                    config = JSON.parse(__firebase_config);
                    id = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                    envCanvas = true;
                } else {
                    config = {
                        apiKey: "AIzaSyCXe9vmaD4TWIXoJIGvvO2wk_MwMDt6Gns",
                        authDomain: "roznivenc.firebaseapp.com",
                        projectId: "roznivenc",
                        storageBucket: "roznivenc.firebasestorage.app",
                        messagingSenderId: "334196797512",
                        appId: "1:334196797512:web:a79d9f1e2d74d44ca8287d",
                        measurementId: "G-HQRNK6YB8E"
                    };
                    id = "roznivenc-app";
                }

                const app = initializeApp(config);
                const auth = getAuth(app);
                const firestoreDb = getFirestore(app);

                setIsCanvasEnv(envCanvas);
                setAppId(id);
                setDb(firestoreDb);

                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) {
                        console.error("Auth error", err);
                    }
                };
                initAuth();

                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, [fbReady]);

            // Pošiljanje podatkov (Samo če si Voditelj in v Skupnem načinu!)
            const pushUpdate = useCallback(async (updates) => {
                if (isPrivateMode) return; // ZASEBNI NAČIN - blokada pošiljanja!
                if (!isLeader) return; 
                if (!db || !user || !appId) return;
                const { doc, setDoc } = window.Firebase;
                
                const activeRoomName = (roomName.trim() || 'JavnaSoba').replace(/[^a-zA-Z0-9_-]/g, '_');
                
                let path = isCanvasEnv 
                    ? ['artifacts', appId, 'public', 'data', 'sessions', activeRoomName] 
                    : ['sessions', activeRoomName];
                    
                const roomRef = doc(db, ...path);
                
                try {
                    await setDoc(roomRef, {
                        ...updates,
                        ...(dbAdminCode ? {} : { adminCode: leaderCode.trim() }), // Samodejno zakleni sobo ob prvi molitvi
                        updatedAt: Date.now(),
                        updatedBy: user.uid
                    }, { merge: true });
                } catch (e) {
                    console.error("Napaka", e);
                }
            }, [db, user, appId, isCanvasEnv, isLeader, isPrivateMode, roomName, dbAdminCode, leaderCode]);

            // NOVO: Funkcija za ročni odklep sobe (Opcija A)
            const resetRoomCode = useCallback(async () => {
                if (!isLeader || isPrivateMode) return;
                if (!db || !user || !appId) return;
                const { doc, setDoc } = window.Firebase;
                const activeRoomName = (roomName.trim() || 'JavnaSoba').replace(/[^a-zA-Z0-9_-]/g, '_');
                let path = isCanvasEnv 
                    ? ['artifacts', appId, 'public', 'data', 'sessions', activeRoomName] 
                    : ['sessions', activeRoomName];
                const roomRef = doc(db, ...path);
                try {
                    await setDoc(roomRef, { adminCode: null, updatedAt: Date.now() }, { merge: true });
                    setLeaderCode(""); // lokalno počisti geslo
                } catch(e) { console.error(e); }
            }, [db, user, appId, isCanvasEnv, isLeader, isPrivateMode, roomName]);


            // Poslušanje baze
            useEffect(() => {
                if (!user || !db || !appId) return;
                
                const { doc, onSnapshot } = window.Firebase;
                
                isFirstLoad.current = true; // Ob vsaki novi povezavi resetiramo
                
                const activeRoomName = (roomName.trim() || 'JavnaSoba').replace(/[^a-zA-Z0-9_-]/g, '_');
                
                let path = isCanvasEnv 
                    ? ['artifacts', appId, 'public', 'data', 'sessions', activeRoomName] 
                    : ['sessions', activeRoomName];
                    
                const roomRef = doc(db, ...path);
                
                const unsubscribe = onSnapshot(roomRef, (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.data();
                        
                        setDbAdminCode(data.adminCode || null); // Shrani admin geslo trenutne sobe
                        lastSharedState.current = data; // Tih zapis zadnjega skupnega stanja
                        
                        if (isPrivateModeRef.current) return; // Zasebni način ignorira posodobitve UI
                        
                        // Ob prvem nalaganju VEDNO prevzamemo stanje iz baze
                        // V nadaljevanju pa ignoriramo posodobitve, ki smo jih sprožili sami
                        if (isFirstLoad.current) {
                            isFirstLoad.current = false;
                        } else if (data.updatedBy === user.uid) {
                            return; 
                        }

                        applyState(data);
                    } else {
                        // Soba ne obstaja
                        setDbAdminCode(null);
                        lastSharedState.current = null;
                        if (!isPrivateModeRef.current) {
                            resetToStart();
                        }
                    }
                }, (error) => console.error("Sync error", error));

                return () => unsubscribe();
            }, [user, db, appId, isCanvasEnv, roomName, applyState, resetToStart]);

            // NOVO: Poslušanje vseh aktivnih sob (za prikaz "utripa" aplikacije)
            useEffect(() => {
                if (!user || !db || !appId) return;
                const { collection, onSnapshot } = window.Firebase;
                
                let path = isCanvasEnv 
                    ? ['artifacts', appId, 'public', 'data', 'sessions'] 
                    : ['sessions'];
                    
                const colRef = collection(db, ...path);
                
                const unsubscribe = onSnapshot(colRef, (snapshot) => {
                    const rooms = [];
                    const now = Date.now();
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        // Prikaži sobe, ki so bile aktivne v zadnjih 24 urah (86400000 ms)
                        if (data.updatedAt && (now - data.updatedAt < 86400000)) {
                            rooms.push({
                                id: doc.id,
                                updatedAt: data.updatedAt
                            });
                        }
                    });
                    // Razvrsti od najbolj nedavno aktivne naprej
                    rooms.sort((a, b) => b.updatedAt - a.updatedAt);
                    setActiveRooms(rooms);
                }, (error) => console.error("Sync error collections", error));
    
                return () => unsubscribe();
            }, [user, db, appId, isCanvasEnv]);

            const pickRandomLang = useCallback((currentLang) => {
                const langs = ['sl', 'de', 'en', 'it', 'la'];
                const available = langs.filter(l => l !== currentLang);
                return available[Math.floor(Math.random() * available.length)];
            }, []);

            useEffect(() => {
                if (miraculousTriggers.length === 0) {
                    setMiraculousTriggers(getNewTriggers());
                }
            }, [miraculousTriggers.length]);

            useEffect(() => {
                if (phase === 'decades' && !showMiraculous) {
                    const absoluteStep = decadeIndex * 13 + step;
                    const safeTriggers = Array.isArray(miraculousTriggers) ? miraculousTriggers : [];
                    
                    if (safeTriggers.includes(absoluteStep)) {
                        const newTriggers = safeTriggers.filter(t => t !== absoluteStep);
                        setShowMiraculous(true);
                        setMiraculousTriggers(newTriggers);
                        
                        pushUpdate({
                            showMiraculous: true,
                            miraculousTriggers: newTriggers
                        });
                    }
                }
            }, [phase, decadeIndex, step, miraculousTriggers, showMiraculous, pushUpdate]);

            useEffect(() => {
                setShowMysteryImage(false);
            }, [decadeIndex, phase]);

            const handleNextStep = useCallback(() => {
                if (phase === 'finished') return;

                let newLang = lang;
                if (isRoulettePrayer) newLang = pickRandomLang(lang);

                let newPhase = phase;
                let newStep = step;
                let newDecadeIndex = decadeIndex;

                if (phase === 'intro') {
                    if (step < 5) newStep++;
                    else { newPhase = 'decades'; newStep = 0; }
                } else if (phase === 'decades') {
                    if (step < 12) newStep++;
                    else {
                        if (decadeIndex < 4) {
                            if (isRouletteDecade && !isRoulettePrayer) newLang = pickRandomLang(lang);
                            newDecadeIndex++;
                            newStep = 0;
                        } else {
                            newPhase = 'outro';
                            newStep = 0;
                        }
                    }
                } else if (phase === 'outro') {
                    if (step < 7) newStep++;
                    else {
                        newPhase = 'finished';
                        newStep = 0;
                    }
                }

                setLang(newLang);
                setPhase(newPhase);
                setStep(newStep);
                setDecadeIndex(newDecadeIndex);

                pushUpdate({
                    lang: newLang,
                    phase: newPhase,
                    step: newStep,
                    decadeIndex: newDecadeIndex
                });
            }, [phase, step, decadeIndex, lang, isRoulettePrayer, isRouletteDecade, pickRandomLang, pushUpdate]);

            const handlePrevStep = useCallback(() => {
                let newPhase = phase;
                let newStep = step;
                let newDecadeIndex = decadeIndex;

                if (phase === 'intro') {
                    if (step > 0) newStep--;
                } else if (phase === 'decades') {
                    if (step > 0) newStep--;
                    else {
                        if (decadeIndex > 0) { newDecadeIndex--; newStep = 12; }
                        else { newPhase = 'intro'; newStep = 5; }
                    }
                } else if (phase === 'outro') {
                    if (step > 0) newStep--;
                    else { newPhase = 'decades'; newStep = 12; }
                } else if (phase === 'finished') {
                    newPhase = 'outro';
                    newStep = 7;
                }

                setPhase(newPhase);
                setStep(newStep);
                setDecadeIndex(newDecadeIndex);

                pushUpdate({
                    phase: newPhase,
                    step: newStep,
                    decadeIndex: newDecadeIndex
                });
            }, [phase, step, decadeIndex, pushUpdate]);


            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (!canControl) return;
                    if (view === 'prayer' && !showMiraculous) {
                        if (e.key === 'ArrowRight' || e.key === ' ') {
                            e.preventDefault();
                            triggerVibration(15);
                            handleNextStep();
                        } else if (e.key === 'ArrowLeft') {
                            e.preventDefault();
                            triggerVibration(10);
                            handlePrevStep();
                        }
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [view, showMiraculous, canControl, handleNextStep, handlePrevStep, triggerVibration]);

            const onTouchStart = (e) => {
                touchStartX.current = e.touches[0].clientX;
                touchStartY.current = e.touches[0].clientY;
            };

            const onTouchEndHandler = (e) => {
                if (!canControl) return;
                if (touchStartX.current === null || touchStartY.current === null) return;
                if (showMiraculous) return;

                const touchEndX = e.changedTouches[0].clientX;
                const touchEndY = e.changedTouches[0].clientY;
                const deltaX = touchStartX.current - touchEndX;
                const deltaY = touchStartY.current - touchEndY;

                if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 50) {
                    if (deltaX > 0) {
                        triggerVibration(15);
                        handleNextStep();
                    } else {
                        triggerVibration(10);
                        handlePrevStep();
                    }
                }
                
                touchStartX.current = null;
                touchStartY.current = null;
            };

            // Pomožna funkcija za preklop načina
            const toggleMode = (newMode) => {
                if (newMode === isPrivateMode) return;
                triggerVibration(10);
                setIsPrivateMode(newMode);
                if (typeof window !== 'undefined' && window.localStorage) {
                    localStorage.setItem('rosary_private_mode', newMode);
                }
                
                if (newMode) { // V ZASEBNO
                    const saved = typeof window !== 'undefined' && window.localStorage ? localStorage.getItem('rosary_private_state') : null;
                    if (saved) {
                        try { applyState(JSON.parse(saved)); } catch(e) { resetToStart(); }
                    } else {
                        resetToStart();
                    }
                } else { // V SKUPNO
                    if (lastSharedState.current) {
                        applyState(lastSharedState.current);
                    } else {
                        resetToStart();
                    }
                }
            };
            
            const safeLang = PRAYERS[lang] ? lang : 'sl';
            const safeMysteryType = MYSTERIES[mysteryType] ? mysteryType : getMysteryForToday();

            const renderMainMenu = () => (
                <div className="flex flex-col items-center pt-2 pb-6 px-4 space-y-5 animate-slide-up w-full max-w-md mx-auto relative z-10 mt-2">
                    
                    {/* HEADER / STATUS */}
                    <div className="w-full flex justify-end h-6">
                        {!isPrivateMode && (
                            <div className="flex items-center gap-1.5 opacity-80 z-20 px-3 py-1 rounded-full shadow-sm bg-white/60 backdrop-blur-sm border border-[#e8dfc8]">
                               {user ? (
                                   <>
                                       <span className="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_5px_#22c55e] animate-pulse"></span>
                                       <span className="text-[9px] text-[#22c55e] font-black tracking-widest uppercase">Povezano</span>
                                   </>
                               ) : (
                                   <>
                                       <span className="w-2 h-2 rounded-full bg-red-500"></span>
                                       <span className="text-[9px] text-[#8b1a1a] font-black tracking-widest uppercase">Brez povezave</span>
                                   </>
                               )}
                            </div>
                        )}
                    </div>

                    {/* HERO SLIKA */}
                    <div className="relative w-36 h-36 md:w-44 md:h-44 mx-auto flex items-center justify-center mt-0 mb-2">
                        <div className="absolute -inset-4 bg-[#d4af37]/20 rounded-full blur-xl pulse-soft"></div>

                                <Icon name="book" className="w-5 h-5" />
                            </button>

                            <div className="flex flex-col items-center gap-1.5 relative z-[60]">
                                <div className="flex gap-1.5">
                                    {[0, 1, 2, 3, 4].map(i => {
                                        let stateClass = 'w-3 bg-[#d2c5aa]/60';
                                        if (phase === 'outro' || (phase === 'decades' && i < decadeIndex)) {
                                            stateClass = 'w-3 bg-[#d4af37]';
                                        } else if (phase === 'decades' && i === decadeIndex) {
                                            stateClass = 'w-6 bg-[#8b1a1a] shadow-sm';
                                        }
                                        return <div key={`d-${i}`} className={`h-1.5 rounded-sm transition-all duration-500 ${stateClass}`} />;
                                    })}
                                </div>
                                
                                <div className="flex gap-1 items-center">
                                    {beadArray.map((_, i) => {
                                        let isLarge = false;
                                        if (phase === 'intro') isLarge = (i === 0 || i === 1 || i === 5);
                                        else if (phase === 'decades') isLarge = (i === 0 || i === 11 || i === 12);
                                        else if (phase === 'outro') isLarge = (i === 0 || i === 1 || i === 5 || i === 6 || i === 7);

                                        return (
                                            <div 
                                                key={`b-${i}`}
                                                className={`rounded-full transition-all duration-300 ${
                                                    isLarge ? 'w-1.5 h-1.5' : 'w-1 h-1'
                                                } ${
                                                    i === step ? 'bg-[#121c33] ring-1 ring-[#d4af37] ring-offset-1 ring-offset-[#f6f3eb] scale-125' : 
                                                    i < step ? 'bg-[#8b1a1a]/60' : 'bg-[#d2c5aa]'
                                                }`}
                                            />
                                        );
                                    })}
                                </div>
                            </div>

                            <div className="w-10 h-10 flex-shrink-0 flex justify-end relative z-[60]">
                                {phase === 'decades' && (
                                    <button 
                                        onClick={() => { triggerVibration(10); setShowMysteryImage(!showMysteryImage); }}
                                        className={`w-10 h-10 rounded-full shadow-sm flex items-center justify-center transform transition-all active:scale-90 border ${showMysteryImage ? 'bg-[#121c33] text-[#d4af37] border-[#121c33]' : 'bg-[#fcfaf5] text-[#8b1a1a] hover:text-[#121c33] border-[#d2c5aa]'}`}
                                        aria-label="Prikaži sliko"
                                    >
                                        <Icon name="eye" className="w-5 h-5" />
                                    </button>
                                )}
                            </div>
                        </div>
                        
                        {!showMysteryImage ? (
                            <div className="bg-[#fdfbf7] rounded-xl p-5 md:p-8 pt-6 md:pt-8 pb-36 md:pb-40 shadow-xl border border-[#d4af37]/40 relative overflow-y-auto flex-grow flex flex-col justify-start z-10">
                                <div className="absolute top-0 left-0 w-16 h-16 border-t-4 border-l-4 border-[#d4af37]/20 rounded-tl-xl m-2 pointer-events-none"></div>
                                <div className="absolute top-0 right-0 w-16 h-16 border-t-4 border-r-4 border-[#d4af37]/20 rounded-tr-xl m-2 pointer-events-none"></div>

                                <div className="text-center mb-4 flex flex-col items-center relative z-10">
                                    <span className="px-3 py-1 bg-[#121c33] text-[#d4af37] rounded-sm text-[9px] font-bold mb-3 uppercase tracking-[0.2em] shadow-sm">
                                        {subtitle}
                                    </span>
                                    <h2 className="text-xl md:text-2xl font-serif-holy font-bold text-[#8b1a1a] uppercase tracking-tight drop-shadow-sm">{title}</h2>
                                </div>
                                
                                <div className="block text-center relative z-10 mt-1">
                                    <div className="animate-fade-in" key={`${phase}-${decadeIndex}-${step}-${safeLang}`}>
                                        {content}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="rounded-xl shadow-2xl relative overflow-hidden flex-grow flex flex-col justify-center items-center border border-[#d4af37]/50 animate-fade-in bg-black z-10">
                                {MYSTERY_IMAGES[safeMysteryType]?.[decadeIndex] ? (
                                    <img src={MYSTERY_IMAGES[safeMysteryType][decadeIndex]} className="absolute inset-0 w-full h-full object-cover animate-fade-in" />
                                ) : (
                                    <div className="absolute inset-0 bg-gradient-to-br from-[#121c33] to-[#0a0f1c]"></div>
                                )}
                                
                                <div className="absolute top-0 left-0 w-full h-24 bg-gradient-to-b from-black/40 to-transparent pointer-events-none"></div>
                                <div className="absolute bottom-0 left-0 w-full h-32 bg-gradient-to-t from-black/50 to-transparent pointer-events-none"></div>
                            </div>
                        )}

                        {canControl ? (
                            <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-lg px-4 md:px-6 flex justify-between items-end pointer-events-none z-50">
                                <button 
                                    onClick={() => { triggerVibration(10); handlePrevStep(); }}
                                    className="w-12 h-12 bg-[#fcfaf5] rounded-full shadow-lg flex items-center justify-center text-[#6d5a42] hover:text-[#8b1a1a] transform transition-all active:scale-90 border border-[#d2c5aa] pointer-events-auto mb-2 md:mb-4"
                                    aria-label="Nazaj"
                                >
                                    <Icon name="arrowLeft" className="w-6 h-6" />
                                </button>

                                <button 
                                    onClick={() => { triggerVibration(15); handleNextStep(); }}
                                    className="w-20 h-20 md:w-24 md:h-24 rounded-full shadow-[0_10px_25px_rgba(0,0,0,0.3)] flex items-center justify-center text-[#d4af37] transform transition-all active:scale-95 border-[4px] border-[#d4af37] group pointer-events-auto relative overflow-hidden bg-gradient-to-br from-[#8b1a1a] to-[#4a0e0e]"
                                >
                                    {CUSTOM_BEAD_IMAGE ? (
                                        <img src={CUSTOM_BEAD_IMAGE} alt="Naprej" className="absolute inset-0 w-full h-full object-cover rounded-full" />
                                    ) : (
                                        <span className="text-4xl md:text-5xl drop-shadow-md group-hover:scale-110 group-active:scale-90 transition-transform duration-300 font-serif-holy relative z-10">✟</span>
                                    )}
                                    {CUSTOM_BEAD_IMAGE && <div className="absolute inset-0 bg-black/10 group-active:bg-black/30 transition-colors pointer-events-none rounded-full"></div>}
                                </button>
                            </div>
                        ) : (
                            <div className="fixed bottom-8 left-1/2 -translate-x-1/2 w-full max-w-lg px-4 flex justify-center pointer-events-none z-50">
                                <div className="bg-[#121c33]/90 backdrop-blur-md text-[#d4af37] px-6 py-3 rounded-full shadow-lg border border-[#d4af37]/30 text-[10px] md:text-xs font-bold uppercase tracking-widest flex items-center gap-2">
                                    <span className="w-2 h-2 rounded-full bg-[#d4af37] shadow-[0_0_5px_#d4af37]"></span>
                                    {isPrivateMode ? "ZASEBNI NAČIN" : "Molitev vodi administrator..."}
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div 
                    className={`min-h-screen flex flex-col items-center ${view === 'menu' ? 'pb-12' : 'pb-4'}`}
                    onTouchStart={view === 'prayer' ? onTouchStart : undefined}
                    onTouchEnd={view === 'prayer' ? onTouchEndHandler : undefined}
                >
                    <div className={`w-full max-w-lg flex flex-col px-4 md:px-6 ${view === 'menu' ? 'mt-0 md:mt-2' : 'mt-2 h-[95vh]'}`}>
                        {view === 'menu' ? renderMainMenu() : renderPrayerContent()}
                    </div>

                    {view === 'menu' && (
                        <div className="mt-auto pt-8 px-8 text-[#8b1a1a] text-[10px] font-bold text-center uppercase tracking-[0.3em] opacity-70 leading-loose">
                            Ave Maria ✟ Gratia Plena<br/>
                            Dominus Tecum
                        </div>
                    )}

                    {/* MODAL ZA ČUDODELNO SVETINJO */}
                    {showMiraculous && (
                        <div className="fixed inset-0 bg-[#121c33]/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4 animate-fade-in">
                            <div className="bg-[#fdfbf7] p-8 rounded-2xl max-w-sm w-full shadow-2xl border-2 border-[#d4af37] text-center relative overflow-hidden transform transition-all animate-slide-up">
                                <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-[#d4af37] via-[#f4e0aa] to-[#d4af37]"></div>
                                
                                <div className="w-20 h-28 mx-auto mb-6 bg-gradient-to-br from-[#121c33] to-[#0a0f1c] rounded-[40%] border-[3px] border-[#d4af37] flex items-center justify-center shadow-lg relative overflow-hidden">
                                    {MIRACULOUS_MEDAL_IMAGE ? (
                                        <img src={MIRACULOUS_MEDAL_IMAGE} alt="Čudodelna svetinja" className="w-full h-full object-cover" />
                                    ) : (
                                        <span className="text-4xl filter drop-shadow-md">🏅</span>
                                    )}
                                    <div className="absolute inset-0 shadow-[inset_0_0_15px_rgba(0,0,0,0.5)] rounded-[40%] pointer-events-none"></div>
                                </div>
                                
                                <h3 className="text-xl font-serif-holy font-bold text-[#8b1a1a] mb-4 uppercase tracking-wider">{PRAYERS[safeLang].miraculousTitle}</h3>
                                <p className="text-lg md:text-xl font-serif-holy font-bold text-[#2c1810] mb-8 italic px-2">
                                    "{PRAYERS[safeLang].miraculous}"
                                </p>
                                
                                {canControl ? (
                                    <button 
                                        onClick={() => { 
                                            triggerVibration(10); 
                                            setShowMiraculous(false); 
                                            pushUpdate({ showMiraculous: false });
                                        }}
                                        className="bg-gradient-to-b from-[#8b1a1a] to-[#5c0e0e] text-[#f4e0aa] w-full py-4 rounded-xl font-serif-holy font-bold text-lg shadow-lg hover:from-[#a01e1e] hover:to-[#731212] transition-colors border-b-4 border-[#3e0808] active:translate-y-1 active:border-b-0"
                                    >
                                        AMEN
                                    </button>
                                ) : (
                                    <div className="text-[#8b1a1a] font-bold text-xs uppercase tracking-widest">
                                        Čakam voditelja...
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
