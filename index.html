                isFirstLoad.current = true; 
                const activeRoomName = (roomName.trim() || 'SkupnaMolitev').replace(/[^a-zA-Z0-9_-]/g, '_');
                
                let path = isCanvasEnv ? ['artifacts', appId, 'public', 'data', 'sessions', activeRoomName] : ['sessions', activeRoomName];
                
                const unsubscribe = onSnapshot(doc(db, ...path), (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.data();
                        setDbAdminCode(data.adminCode || null);
                        lastSharedState.current = data;
                        if (isPrivateModeRef.current) return; 
                        if (isFirstLoad.current) isFirstLoad.current = false;
                        else if (data.updatedBy === user.uid) return; 
                        applyState(data);
                    } else {
                        setDbAdminCode(null);
                        lastSharedState.current = null;
                        if (!isPrivateModeRef.current) resetToStart(true);

            useEffect(() => {

                let path = isCanvasEnv ? ['artifacts', appId, 'public', 'data', 'sessions'] : ['sessions'];
                
                const unsubscribe = onSnapshot(collection(db, ...path), (snapshot) => {
                    const rooms = [];
                    const now = Date.now();
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        if (data.updatedAt && (now - data.updatedAt < 86400000)) rooms.push({ id: doc.id, updatedAt: data.updatedAt });
                    });
                    rooms.sort((a, b) => b.updatedAt - a.updatedAt);
                    setActiveRooms(rooms);

                return () => unsubscribe();

            const pickRandomLang = useCallback((currentLang) => {
                const activeLangs = rouletteLangs.length > 0 ? rouletteLangs : ['sl', 'en', 'de', 'it', 'la', 'pl', 'hr', 'sq', 'es', 'fr'];
                let available = activeLangs.filter(l => l !== currentLang);

                if (phase === 'decades' && !showMiraculous) {
                    const absoluteStep = decadeIndex * 13 + step;
                    const safeTriggers = Array.isArray(miraculousTriggers) ? miraculousTriggers : [];
                    if (safeTriggers.includes(absoluteStep)) {
                        const newTriggers = safeTriggers.filter(t => t !== absoluteStep);
                        setShowMiraculous(true);
                        setMiraculousTriggers(newTriggers);
                        pushUpdate({ showMiraculous: true, miraculousTriggers: newTriggers });

            const handleNextStep = useCallback(() => {
                if (phase === 'finished') return;
                let newLang = lang;
                if (isRoulettePrayer) newLang = pickRandomLang(lang);
                let newPhase = phase;
                let newStep = step;
                let newDecadeIndex = decadeIndex;

                if (phase === 'intro') {
                    if (step === -1) { newStep = 0; }
                    else if (step < 6) { newStep++; }
                    else { 
                        newPhase = 'decades'; 
                        newStep = (reflections[1] && reflections[1].trim() !== '') ? -1 : 0; 
                    }
                } else if (phase === 'decades') {
                    if (step === -1) { newStep = 0; }
                    else if (step < 12) { newStep++; }
                    else {
                        if (decadeIndex < 4) {
                            if (isRouletteDecade && !isRoulettePrayer) newLang = pickRandomLang(lang);
                            newDecadeIndex++;
                            newStep = (reflections[newDecadeIndex + 1] && reflections[newDecadeIndex + 1].trim() !== '') ? -1 : 0;
                        } else {
                            newPhase = 'outro';
                            newStep = (reflections[6] && reflections[6].trim() !== '') ? -1 : 0;
                        }
                    }
                } else if (phase === 'outro') {
                    if (step === -1) { newStep = 0; }
                    else if (step < 11) newStep++;
                    else { newPhase = 'finished'; newStep = 0; }
                }

                setLang(newLang); setPhase(newPhase); setStep(newStep); setDecadeIndex(newDecadeIndex);

            const handleSkipSection = useCallback(() => {
                let newLang = lang;
                let newPhase = phase;
                let newStep = 0;
                let newDecadeIndex = decadeIndex;

                if (phase === 'intro') {
                    newPhase = 'decades';
                    newStep = (reflections[1] && reflections[1].trim() !== '') ? -1 : 0;
                } else if (phase === 'decades') {
                    if (decadeIndex < 4) {
                        if (isRouletteDecade && !isRoulettePrayer) newLang = pickRandomLang(lang);
                        newDecadeIndex++;
                        newStep = (reflections[newDecadeIndex + 1] && reflections[newDecadeIndex + 1].trim() !== '') ? -1 : 0;
                    } else {
                        newPhase = 'outro';
                        newStep = (reflections[6] && reflections[6].trim() !== '') ? -1 : 0;
                    }
                } else if (phase === 'outro') {
                    newPhase = 'finished';
                }

                setLang(newLang); setPhase(newPhase); setStep(newStep); setDecadeIndex(newDecadeIndex);
                pushUpdate({ lang: newLang, phase: newPhase, step: newStep, decadeIndex: newDecadeIndex });

            const handlePrevStep = useCallback(() => {
                let newPhase = phase;
                let newStep = step;
                let newDecadeIndex = decadeIndex;

                if (phase === 'intro') {
                    if (step > 0) newStep--;
                    else if (step === 0 && reflections[0] && reflections[0].trim() !== '') newStep = -1;
                } else if (phase === 'decades') {
                    if (step > 0) newStep--;
                    else if (step === 0 && reflections[decadeIndex + 1] && reflections[decadeIndex + 1].trim() !== '') {
                        newStep = -1;
                    } else {
                        if (decadeIndex > 0) { newDecadeIndex--; newStep = 12; }
                        else { newPhase = 'intro'; newStep = 6; }
                    }
                } else if (phase === 'outro') {
                    if (step > 0) newStep--;
                    else if (step === 0 && reflections[6] && reflections[6].trim() !== '') newStep = -1;
                    else { newPhase = 'decades'; newStep = 12; }
                } else if (phase === 'finished') {
                    newPhase = 'outro';
                    newStep = 11;
                }

                setPhase(newPhase); setStep(newStep); setDecadeIndex(newDecadeIndex);

                            {/* Fiksirana širina kontejnerja (w-10), da ne poruši sredine! */}
                            <div className="flex justify-end relative z-[60] w-10 h-10">
                                {phase === 'decades' && (<button onClick={() => { triggerVibration(10); setShowMysteryImage(!showMysteryImage); }} className={`w-10 h-10 rounded-full shadow-sm flex items-center justify-center transform transition-all active:scale-90 border ${showMysteryImage ? 'bg-[#f3e8d3] text-[#0a0e17] border-[#d4af37]' : 'bg-[#131b2f] text-[#d4af37] hover:bg-[#1e293b] border-[#2a3a5c]'}`} aria-label="Prikaži sliko"><Icon name="eye" className="w-5 h-5" /></button>)}
                            </div>
                        </div>
                        
                        {!showMysteryImage ? (
                            <div className="bg-[#131b2f]/90 backdrop-blur-md rounded-2xl p-5 md:p-8 pt-5 md:pt-6 pb-36 md:pb-40 shadow-2xl border border-[#d4af37]/30 relative overflow-y-auto hide-scrollbar flex-grow flex flex-col justify-start z-10">
                                <div className="absolute top-0 left-0 w-16 h-16 border-t-4 border-l-4 border-[#d4af37]/20 rounded-tl-2xl m-2 pointer-events-none"></div>
                                <div className="absolute top-0 right-0 w-16 h-16 border-t-4 border-r-4 border-[#d4af37]/20 rounded-tr-2xl m-2 pointer-events-none"></div>

                                {/* Plavajoči števec in zastavica */}
                                {hailMaryBadge}
                                {rouletteFlagBadge}

                                {/* Zmanjšani odmiki in pisave, da zagotovimo več prostora za samo molitev */}
                                <div className="text-center mb-3 md:mb-4 flex flex-col items-center relative z-10 px-[3.8rem] md:px-20 mt-0 w-full mx-auto">
                                    {subtitle && (
                                        <div className={`px-2.5 py-1 bg-[#0c101d] text-[#d4af37] border border-[#d4af37]/30 rounded-lg text-[9px] md:text-[11px] font-bold uppercase tracking-wide shadow-sm text-center inline-block max-w-full leading-tight break-words ${helperSubtitle ? 'mb-1' : 'mb-2'}`}>
                                            {subtitle}
                                        </div>
                                    )}
                                    {helperSubtitle && (
                                        <span className="text-[#94a3b8] text-[10px] md:text-xs italic font-medium mb-1.5 px-1 text-center leading-tight">
                                            {helperSubtitle}
                                        </span>
                                    )}
                                    <h2 className="text-xl md:text-2xl font-serif-holy font-bold text-[#d4af37] uppercase tracking-tight drop-shadow-sm mt-0.5">{title}</h2>
                                </div>
                                
                                <div className="block text-center relative z-10 mt-1">
                                    <div className="animate-fade-in" key={`${phase}-${decadeIndex}-${step}-${safeLang}`}>
                                        {content}
                                    </div>
                                </div>

                                {!isPrivateMode && intention && intention.trim() !== '' && (phase === 'intro' || phase === 'outro') && (
                                    <div className="mt-8 pt-5 border-t border-[#2a3a5c]/70 text-center relative z-10 animate-fade-in">
                                        <span className="text-[10px] text-[#94a3b8] font-bold uppercase tracking-[0.2em] mb-2 block">{t('intentLabel')}</span>
                                        <p className="text-[#d4af37] font-serif-holy font-semibold italic text-lg md:text-xl px-2">"{intention}"</p>
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="rounded-2xl shadow-2xl relative overflow-hidden flex-grow flex flex-col justify-center items-center border border-[#d4af37]/30 animate-fade-in bg-black z-10">
                                {MYSTERY_IMAGES[safeMysteryType]?.[decadeIndex] && !imgErrors[`mystery-${safeMysteryType}-${decadeIndex}`] ? (
                                    <img src={MYSTERY_IMAGES[safeMysteryType][decadeIndex]} className="absolute inset-0 w-full h-full object-cover animate-fade-in" onError={() => handleImgError(`mystery-${safeMysteryType}-${decadeIndex}`)} />
                                ) : (
                                    <div className="absolute inset-0 flex flex-col items-center justify-center bg-gradient-to-br from-[#131b2f] via-[#0a0e17] to-[#04060a]">
                                        <div className="absolute w-64 h-64 bg-[#d4af37] rounded-full blur-[100px] opacity-10"></div>
                                        <div className="text-[#d4af37] font-serif-holy text-8xl opacity-30 relative z-10 drop-shadow-sm">✟</div>
                                    </div>
                                )}
                                <div className="absolute top-0 left-0 w-full h-32 bg-gradient-to-b from-black/80 to-transparent pointer-events-none"></div>
                                <div className="absolute bottom-0 left-0 w-full h-40 bg-gradient-to-t from-black/80 to-transparent pointer-events-none"></div>
                                
                                {/* Plavajoči števec na sliki in zastavica */}
                                {hailMaryBadge}
                                {rouletteFlagBadge}
                            </div>
                        )}

                        {canControl ? (
                            <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-lg px-4 md:px-6 flex justify-between items-end pointer-events-none z-50">
                                <button onClick={() => { triggerVibration(10); handlePrevStep(); }} className="w-14 h-14 bg-[#131b2f] rounded-full shadow-lg flex items-center justify-center text-[#94a3b8] hover:text-[#d4af37] hover:bg-[#1e293b] transform transition-all active:scale-90 border border-[#2a3a5c] pointer-events-auto mb-2 md:mb-4" aria-label="Nazaj"><Icon name="arrowLeft" className="w-7 h-7" /></button>
                                
                                <div className="flex items-center gap-3 md:gap-4 pointer-events-none">
                                    {/* Gumb za preskok celotnega sklopa (Uvod, Desetka, Zaključek) */}
                                    {((phase === 'intro' && (step === 0 || step === -1)) || (phase === 'decades' && (step === 0 || step === -1)) || (phase === 'outro' && (step === 0 || step === -1))) && (
                                        <button onClick={() => { triggerVibration(10); handleSkipSection(); }} className="w-11 h-11 md:w-12 md:h-12 rounded-full flex items-center justify-center bg-[#131b2f]/80 text-[#94a3b8]/50 hover:text-[#d4af37]/90 hover:bg-[#1e293b] border border-[#2a3a5c]/50 pointer-events-auto transform transition-all active:scale-90 shadow-sm" title="Preskoči sklop">
                                            <Icon name="skipNext" className="w-4 h-4 md:w-5 md:h-5" />
                                        </button>
                                    )}
                                    {/* Gumb za preskok na Slava Očetu znotraj desetke (pojavi se samo na 1. Zdravi Mariji) */}
                                    {phase === 'decades' && step === 1 && (
                                        <button onClick={() => { triggerVibration(10); setStep(11); pushUpdate({ step: 11 }); }} className="w-11 h-11 md:w-12 md:h-12 rounded-full flex items-center justify-center bg-[#1e293b]/80 text-[#d4af37]/60 hover:text-[#d4af37] hover:bg-[#2a3a5c] border border-[#d4af37]/40 pointer-events-auto transform transition-all active:scale-90 shadow-sm relative" title="Preskoči 10 Zdravih Marij">
                                            <Icon name="fastForward" className="w-4 h-4 md:w-5 md:h-5" />
                                            <span className="absolute -top-1 -right-1 bg-[#d4af37] text-[#0a0e17] text-[8px] font-bold px-1.5 py-0.5 rounded-full shadow-sm">10x</span>
                                        </button>
                                    )}
                                    <button onClick={() => { triggerVibration(15); handleNextStep(); }} className="w-24 h-24 md:w-28 md:h-28 rounded-full shadow-[0_15px_30px_rgba(0,0,0,0.6)] flex items-center justify-center text-[#d4af37] transform transition-all active:scale-95 border-[4px] border-[#d4af37] group pointer-events-auto relative overflow-hidden bg-gradient-to-br from-[#8b1a1a] to-[#4a0e0e]">
                                        {CUSTOM_BEAD_IMAGE && !imgErrors['bead'] ? (
                                            <img src={CUSTOM_BEAD_IMAGE} alt="Naprej" className="absolute inset-0 w-full h-full object-cover rounded-full" onError={() => handleImgError('bead')} />
                                        ) : (
                                            <div className="absolute inset-0 w-full h-full rounded-full bg-gradient-to-br from-[#d4af37] via-[#a67c00] to-[#594300] flex items-center justify-center shadow-[inset_0_-5px_15px_rgba(0,0,0,0.6),inset_0_5px_15px_rgba(255,255,255,0.4)] group-active:scale-95 transition-transform duration-300">
                                                <span className="text-4xl md:text-5xl drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)] text-[#f3e8d3] font-serif-holy relative z-10">✟</span>
                                            </div>
                                        )}
                                        {CUSTOM_BEAD_IMAGE && !imgErrors['bead'] && <div className="absolute inset-0 bg-black/20 group-active:bg-black/50 transition-colors pointer-events-none rounded-full"></div>}
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <div className="fixed bottom-8 left-1/2 -translate-x-1/2 w-full max-w-lg px-4 flex justify-center pointer-events-none z-50">
                                <div className="bg-[#131b2f]/95 backdrop-blur-md text-[#d4af37] px-6 py-4 rounded-full shadow-xl border border-[#d4af37]/30 text-xs md:text-sm font-bold uppercase tracking-widest flex items-center gap-3">
                                    <span className="w-2.5 h-2.5 rounded-full bg-[#d4af37] shadow-[0_0_8px_#d4af37] animate-pulse"></span>
                                    {isPrivateMode ? t('private') : t('adminLeads')}
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className={`min-h-screen flex flex-col items-center relative ${view === 'menu' ? 'pb-12' : 'pb-4'}`} onTouchStart={view === 'prayer' ? onTouchStart : undefined} onTouchEnd={view === 'prayer' ? onTouchEndHandler : undefined}>
                    
                    {!isPrivateMode && view === 'menu' && (
                        <div className="absolute top-4 right-5 z-50 flex items-center gap-1.5 opacity-40 hover:opacity-100 transition-opacity duration-300">
                            <span className={`w-1.5 h-1.5 rounded-full ${user ? 'bg-green-500 shadow-[0_0_4px_#22c55e]' : 'bg-red-500'}`}></span>
                            <span className="text-[8px] font-bold uppercase tracking-widest text-[#94a3b8]">{user ? t('connected') : t('offline')}</span>
                        </div>
                    )}

                    <div className={`w-full max-w-lg flex flex-col px-4 md:px-6 ${view === 'menu' ? 'mt-0 md:mt-2' : 'mt-2 h-[95vh]'}`}>
                        {view === 'menu' ? renderMainMenu() : view === 'reflections' ? renderReflectionsMenu() : renderPrayerContent()}
                    </div>

                    {view === 'menu' && (
                        <div className="mt-auto pt-8 pb-6 px-4 w-full max-w-md flex flex-col items-center gap-4">
                            {/* DISKRETEN SPOROČILNI GUMB - Skrije in prikaže QR kodo */}
                            <button onClick={() => { triggerVibration(10); setShowQr(!showQr); }} className="text-[#d4af37] text-[10px] font-bold text-center uppercase tracking-[0.3em] opacity-40 hover:opacity-100 transition-opacity duration-300 leading-loose focus:outline-none">
                                Ave Maria ✟ Gratia Plena<br/>Dominus Tecum
                            </button>
                            
                            {/* QR KODA Z REZERVNO (DUMMY) GRAFIKO */}
                            {showQr && (
                                <div className="mt-4 flex flex-col items-center justify-center w-full animate-slide-up space-y-4">
                                    <div className="w-48 h-48 rounded-2xl overflow-hidden shadow-2xl flex items-center justify-center bg-white border-[3px] border-[#d4af37] relative">
                                        {QR_CODE_IMAGE && !imgErrors['qr'] ? (
                                            <img src={QR_CODE_IMAGE} alt="QR" className="w-full h-full object-cover p-3" onError={() => handleImgError('qr')} />
                                        ) : (
                                            <div className="w-full h-full flex flex-col items-center justify-center border-2 border-dashed border-[#d4af37]/50 rounded-xl bg-gray-50 m-3 text-center">
                                                <div className="grid grid-cols-2 gap-1 mb-3 opacity-40">
                                                    <div className="w-5 h-5 bg-[#0a0e17] rounded-sm"></div>
                                                    <div className="w-5 h-5 bg-[#0a0e17] rounded-sm"></div>
                                                    <div className="w-5 h-5 bg-[#0a0e17] rounded-sm"></div>
                                                    <div className="w-5 h-5 bg-[#d4af37] rounded-sm"></div>
                                                </div>
                                                <span className="text-[#0a0e17] font-bold text-[10px] uppercase tracking-widest opacity-50">Tvoja QR<br/>Slika</span>
                                            </div>
                                        )}
                                    </div>
                                    
                                    <button 
                                        onClick={copyShareLink}
                                        className="flex items-center justify-center gap-2.5 px-6 py-3 bg-[#131b2f] border border-[#d4af37]/50 text-[#d4af37] rounded-xl text-[10px] md:text-xs font-bold uppercase tracking-widest hover:bg-[#1e293b] hover:border-[#d4af37] transition-all shadow-md active:scale-95"
                                    >
                                        <Icon name={linkCopied ? "check" : "globe"} className="w-4 h-4 md:w-5 md:h-5" />
                                        {linkCopied ? t('linkCopied') : t('copyLink')}
                                    </button>
                                </div>
                            )}

                            {/* JEZIKI APLIKACIJE (UI) */}
                            <div className="flex gap-4 items-center justify-center opacity-40 hover:opacity-100 transition-opacity duration-300 mt-2 flex-wrap max-w-[250px]">
                                {['sl', 'en', 'de'].map(l => (
                                    <button key={l} onClick={() => { triggerVibration(10); setUiLang(l); }} className={`text-[9px] font-bold uppercase tracking-widest transition-colors ${uiLang === l ? 'text-[#d4af37] scale-110' : 'text-[#94a3b8] hover:text-[#f3e8d3]'}`}>{l}</button>
                                ))}
                            </div>
                        </div>
                    )}

                    {showMiraculous && (
                        <div className="fixed inset-0 bg-[#0a0e17]/90 backdrop-blur-md z-[100] flex items-center justify-center p-4 animate-fade-in">
                            <div className="bg-[#131b2f] p-8 rounded-[2rem] max-w-sm w-full shadow-2xl border-2 border-[#d4af37] text-center relative overflow-hidden transform transition-all animate-slide-up">
                                <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-[#d4af37] via-[#f3e8d3] to-[#d4af37]"></div>
                                <div className="w-24 h-32 mx-auto mb-6 bg-gradient-to-br from-[#0a0e17] to-[#04060a] rounded-[40%] border-[3px] border-[#d4af37] flex items-center justify-center shadow-[0_10px_30px_rgba(212,175,55,0.3)] relative overflow-hidden">
                                    {MIRACULOUS_MEDAL_IMAGE && !imgErrors['medal'] ? (
                                        <img src={MIRACULOUS_MEDAL_IMAGE} alt="Čudodelna svetinja" className="w-full h-full object-cover" onError={() => handleImgError('medal')} />
                                    ) : (
                                        <div className="w-full h-full rounded-[40%] bg-gradient-to-br from-[#ffd700] via-[#d4af37] to-[#997a00] flex flex-col items-center justify-center shadow-[inset_0_-10px_20px_rgba(0,0,0,0.5),inset_0_10px_20px_rgba(255,255,255,0.6)] relative">
                                            <div className="absolute inset-2 rounded-[40%] border-[2px] border-[#8a6300] opacity-40"></div>
                                            <span className="text-6xl text-[#fff8e7] filter drop-shadow-[0_3px_5px_rgba(0,0,0,0.4)] relative z-10 mb-2 font-serif-holy">M</span>
                                            <span className="text-[10px] text-[#8a6300] font-bold tracking-widest relative z-10 opacity-80">1830</span>
                                        </div>
                                    )}
                                    <div className="absolute inset-0 shadow-[inset_0_0_20px_rgba(0,0,0,0.8)] rounded-[40%] pointer-events-none"></div>
                                </div>
                                <h3 className="text-2xl font-serif-holy font-bold text-[#d4af37] mb-4 uppercase tracking-wider">{PRAYERS[safeLang].miraculousTitle}</h3>
                                <p className="text-xl md:text-2xl font-serif-holy font-bold text-[#f3e8d3] mb-8 italic px-2 leading-relaxed">"{PRAYERS[safeLang].miraculous}"</p>
                                
                                {canControl ? (
                                    <button onClick={() => { triggerVibration(10); setShowMiraculous(false); pushUpdate({ showMiraculous: false }); }} className="bg-gradient-to-b from-[#d4af37] to-[#b08d29] text-[#0a0e17] w-full py-4 rounded-xl font-serif-holy font-black text-xl shadow-[0_5px_15px_rgba(212,175,55,0.4)] hover:from-[#f4e0aa] hover:to-[#d4af37] transition-colors border-b-4 border-[#8c7322] active:translate-y-1 active:border-b-0">AMEN</button>
                                ) : (
                                    <div className="text-[#d4af37] font-bold text-xs uppercase tracking-widest">{t('waitLeader')}</div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
