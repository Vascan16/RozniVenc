<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Večjezični Rožni Venec</title>
    <!-- Nalaganje knjižnic preko CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- PODATKOVNA BAZA MOLITEV IN SKRIVNOSTI ---
        const PRAYERS = {
            sl: {
                ocenasTitle: "Oče naš",
                ocenas: "Oče naš, ki si v nebesih, posvečeno bodi tvoje ime, pridi k nam tvoje kraljestvo, zgodi se tvoja volja kakor v nebesih tako na zemlji. Daj nam danes naš vsakdanji kruh in odpusti nam naše dolge, kakor tudi mi odpuščamo svojim dolžnikom, in ne vpelji nas v skušnjavo, temveč reši nas hudega. Amen.",
                zdravaTitle: "Zdrava Marija",
                zdrava1: "Zdrava Marija, milosti polna, Gospod je s teboj, blagoslovljena si med ženami in blagoslovljen je sad tvojega telesa, Jezus",
                zdrava2: ". Sveta Marija, Mati božja, prosi za nas grešnike zdaj in ob naši smrtni uri. Amen.",
                slavaTitle: "Slava Očetu",
                slava: "Slava Očetu in Sinu in Svetemu Duhu, kakor je bilo v začetku, tako zdaj in vselej in vekomaj. Amen.",
                fatimaTitle: "Fatimska molitev",
                fatima: "O moj Jezus, odpusti nam naše grehe, obvaruj nas peklenskega ognja in privedi v nebesa vse duše, posebno še tiste, ki so najbolj potrebne tvojega usmiljenja.",
            },
            de: {
                ocenasTitle: "Vater unser",
                ocenas: "Vater unser im Himmel, geheiligt werde dein Name. Dein Reich komme. Dein Wille geschehe, wie im Himmel so auf Erden. Unser tägliches Brot gib uns heute. Und vergib uns unsere Schuld, wie auch wir vergeben unsern Schuldigern. Und führe uns nicht in Versuchung, sondern erlöse uns von dem Bösen. Amen.",
                zdravaTitle: "Gegrüßet seist du, Maria",
                zdrava1: "Gegrüßet seist du, Maria, voll der Gnade, der Herr ist mit dir. Du bist gebenedeit unter den Frauen, und gebenedeit ist die Frucht deines Leibes, Jesus",
                zdrava2: ". Heilige Maria, Mutter Gottes, bitte für uns Sünder jetzt und in der Stunde unseres Todes. Amen.",
                slavaTitle: "Ehre sei dem Vater",
                slava: "Ehre sei dem Vater und dem Sohn und dem Heiligen Geist, wie im Anfang, so auch jetzt und alle Zeit und in Ewigkeit. Amen.",
                fatimaTitle: "O mein Jesus",
                fatima: "O mein Jesus, verzeih uns unsere Sünden, bewahre uns vor dem Feuer der Hölle, führe alle Seelen in den Himmel, besonders jene, die deiner Barmherzigkeit am meisten bedürfen.",
            },
            en: {
                ocenasTitle: "Our Father",
                ocenas: "Our Father, who art in heaven, hallowed be thy name; thy kingdom come; thy will be done on earth as it is in heaven. Give us this day our daily bread; and forgive us our trespasses as we forgive those who trespass against us; and lead us not into temptation, but deliver us from evil. Amen.",
                zdravaTitle: "Hail Mary",
                zdrava1: "Hail Mary, full of grace, the Lord is with thee. Blessed art thou among women, and blessed is the fruit of thy womb, Jesus",
                zdrava2: ". Holy Mary, Mother of God, pray for us sinners, now and at the hour of our death. Amen.",
                slavaTitle: "Glory Be",
                slava: "Glory be to the Father, and to the Son, and to the Holy Spirit. As it was in the beginning, is now, and ever shall be, world without end. Amen.",
                fatimaTitle: "O my Jesus",
                fatima: "O my Jesus, forgive us our sins, save us from the fires of hell, lead all souls to Heaven, especially those most in need of Thy mercy.",
            },
            it: {
                ocenasTitle: "Padre nostro",
                ocenas: "Padre nostro, che sei nei cieli, sia santificato il tuo nome, venga il tuo regno, sia fatta la tua volontà, come in cielo così in terra. Dacci oggi il nostro pane quotidiano, e rimetti a noi i nostri debiti come anche noi li rimettiamo ai nostri debitori, e non abbandonarci alla tentazione, ma liberaci dal male. Amen.",
                zdravaTitle: "Ave Maria",
                zdrava1: "Ave o Maria, piena di grazia, il Signore è con te. Tu sei benedetta fra le donne e benedetto è il frutto del tuo seno, Gesù",
                zdrava2: ". Santa Maria, Madre di Dio, prega per noi peccatori, adesso e nell'ora della nostra morte. Amen.",
                slavaTitle: "Gloria al Padre",
                slava: "Gloria al Padre e al Figlio e allo Spirito Santo. Come era nel principio, ora e sempre, nei secoli dei secoli. Amen.",
                fatimaTitle: "O Gesù mio",
                fatima: "O Gesù mio, perdona le nostre colpe, preservaci dal fuoco dell'inferno, porta in cielo tutte le anime, specialmente le più bisognose della tua misericordia.",
            },
            la: {
                ocenasTitle: "Pater noster",
                ocenas: "Pater noster, qui es in caelis, sanctificetur nomen tuum. Adveniat regnum tuum. Fiat voluntas tua, sicut in caelo et in terra. Panem nostrum quotidianum da nobis hodie, et dimitte nobis debita nostra sicut et nos dimittimus debitoribus nostris. Et ne nos inducas in tentationem, sed libera nos a malo. Amen.",
                zdravaTitle: "Ave Maria",
                zdrava1: "Ave Maria, gratia plena, Dominus tecum. Benedicta tu in mulieribus, et benedictus fructus ventris tui, Iesus",
                zdrava2: ". Sancta Maria, Mater Dei, ora pro nobis peccatoribus, nunc, et in hora mortis nostrae. Amen.",
                slavaTitle: "Gloria Patri",
                slava: "Gloria Patri, et Filio, et Spiritui Sancto. Sicut erat in principio, et nunc, et semper, et in saecula saeculorum. Amen.",
                fatimaTitle: "Domine Iesu",
                fatima: "Domine Iesu, dimitte nobis debita nostra, salva nos ab igne inferiori, perduc in caelum omnes animas, praesertim eas, quae misericordiae tuae maxime indigent.",
            }
        };

        const MYSTERIES = {
            veseli: {
                sl: [", ki si ga Devica od Svetega Duha spočela", ", ki si ga Devica k Elizabeti nosila", ", ki si ga Devica rodila", ", ki si ga Devica v templju darovala", ", ki si ga Devica v templju našla"],
                de: [", den du, o Jungfrau, vom Heiligen Geist empfangen hast", ", den du, o Jungfrau, zu Elisabeth getragen hast", ", den du, o Jungfrau, geboren hast", ", den du, o Jungfrau, im Tempel aufgeopfert hast", ", den du, o Jungfrau, im Tempel wiedergefunden hast"],
                en: ["The Annunciation", "The Visitation", "The Nativity", "The Presentation", "The Finding of Jesus in the Temple"],
                it: ["L'Annunciazione", "La Visitazione", "La Nascita di Gesù", "La Presentazione al Tempio", "Il Ritrovamento nel Tempio"],
                la: ["Annuntiatio", "Visitatio", "Nativitas", "Praesentatio in Templo", "Inventio in Templo"]
            },
            svetli: {
                sl: [", ki je bil krščen v reki Jordan", ", ki je v Kani Galilejski naredil prvi čudež", ", ki je oznanjal božje kraljestvo", ", ki je na gori Tabor pokazal svoje veličastvo", ", ki je postavil sveto rešnjo telo"],
                de: [", der von Johannes getauft worden ist", ", der sich bei der Hochzeit in Kana offenbart hat", ", der uns das Reich Gottes verkündet hat", ", der auf dem Berg verklärt worden ist", ", der uns die Eucharistie gesenkt hat"],
                en: ["The Baptism in the Jordan", "The Wedding Feast at Cana", "The Proclamation of the Kingdom", "The Transfiguration", "The Institution of the Eucharist"],
                it: ["Il Battesimo nel Giordano", "Le Nozze di Cana", "L'Annuncio del Regno di Dio", "La Trasfigurazione", "L'Istituzione dell'Eucaristia"],
                la: ["Baptismus in Iordane", "Nuptiae in Cana", "Proclamatio Regni Dei", "Transfiguratio", "Institutio Eucharistiae"]
            },
            zalostni: {
                sl: [", ki je za nas krvavi pot potil", ", ki je bil za nas bičan", ", ki je bil za nas s trnjem kronan", ", ki je za nas težki križ nesel", ", ki je bil za nas križan"],
                de: [", der für uns Blut geschwitzt hat", ", der für uns gegeißelt worden ist", ", der für uns mit Dornen gekrönt worden ist", ", der für uns das schwere Kreuz getragen hat", ", der für uns gekreuzigt worden ist"],
                en: ["The Agony in the Garden", "The Scourging at the Pillar", "The Crowning with Thorns", "The Carrying of the Cross", "The Crucifixion"],
                it: ["L'Agonia nell'Orto", "La Flagellazione", "L'Incoronazione di Spine", "La Salita al Calvario", "La Crocifissione e Morte"],
                la: ["Agonia in Horto", "Flagellatio", "Coronatio Spinis", "Baiulatio Crucis", "Crucifixio et Mors"]
            },
            castitljivi: {
                sl: [", ki je od mrtvih vstal", ", ki je v nebesa šel", ", ki je Svetega Duha poslal", ", ki je tebe, Devica, v nebesa vzel", ", ki je tebe, Devica, v nebesih kronal"],
                de: [", der von den Toten auferstanden ist", ", der in den Himmel aufgefahren ist", ", der uns den Heiligen Geist gesandt hat", ", der dich, o Jungfrau, in den Himmel aufgenommen hat", ", der dich, o Jungfrau, im Himmel gekrönt hat"],
                en: ["The Resurrection", "The Ascension", "The Descent of the Holy Spirit", "The Assumption of Mary", "The Coronation of the Virgin"],
                it: ["La Risurrezione", "L'Ascensione", "La Discesa dello Spirito Santo", "L'Assunzione di Maria", "L'Incoronazione di Maria"],
                la: ["Resurrectio", "Ascensio", "Descensus Spiritus Sancti", "Assumptio", "Coronatio in Caelo"]
            }
        };

        const MYSTERY_NAMES = {
            veseli: "Veseli del",
            svetli: "Svetli del",
            zalostni: "Žalostni del",
            castitljivi: "Častitljivi del"
        };

        // --- POMOŽNE IKONE (SVG) ---
        const Icon = ({ name }) => {
            const paths = {
                play: "M5 3l14 9-14 9V3z",
                refresh: "M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15",
                check: "M20 6L9 17l-5-5",
                book: "M4 19.5A2.5 2.5 0 016.5 17H20M4 19.5A2.5 2.5 0 006.5 22H20M4 19.5V3a1 1 0 011-1h15a1 1 0 011 1v19a1 1 0 01-1 1H6.5a2.5 2.5 0 01-2.5-2.5z",
                dices: "M3 3h7v7H3z M14 3h7v7h-7z M3 14h7v7H3z M14 14h7v7h-7z"
            };
            return (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d={paths[name]} />
                </svg>
            );
        };

        function App() {
            const [lang, setLang] = useState('sl');
            const [isRouletteMode, setIsRouletteMode] = useState(false);
            const [mysteryType, setMysteryType] = useState('veseli');
            const [decadeIndex, setDecadeIndex] = useState(0); 
            const [step, setStep] = useState(-1); 

            const currentMysteryText = MYSTERIES[mysteryType][lang][decadeIndex];
            const isInsertLanguage = lang === 'sl' || lang === 'de';

            const handleNextStep = () => {
                if (isRouletteMode) {
                    const langs = ['sl', 'de', 'en', 'it', 'la'];
                    const availableLangs = langs.filter(l => l !== lang);
                    const randomLang = availableLangs[Math.floor(Math.random() * availableLangs.length)];
                    setLang(randomLang);
                }

                if (step < 12) {
                    setStep(step + 1);
                } else if (step === 12) {
                    if (decadeIndex < 4) {
                        setDecadeIndex(decadeIndex + 1);
                        setStep(0);
                    } else {
                        setStep(13); 
                    }
                }
            };

            const renderMainMenu = () => (
                <div className="flex flex-col items-center py-8 px-4 space-y-8 animate-fade-in">
                    <div className="text-center">
                        <div className="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4 border-2 border-amber-200">
                            <span className="text-4xl text-blue-900 font-bold">✟</span>
                        </div>
                        <h2 className="text-3xl font-black text-blue-950 uppercase tracking-tight">Nastavitve</h2>
                        <p className="text-slate-500 font-medium">Pripravi se na zbrano molitev</p>
                    </div>

                    <div className="w-full max-w-sm space-y-4 bg-white p-6 rounded-3xl shadow-xl border border-blue-50">
                        <div className="space-y-2">
                            <label className="text-[10px] font-black text-blue-900 uppercase tracking-widest ml-1">Jezik</label>
                            <select 
                                className="w-full bg-slate-50 border-2 border-slate-100 text-blue-950 p-4 rounded-2xl font-bold outline-none"
                                value={lang}
                                onChange={(e) => setLang(e.target.value)}
                            >
                                <option value="sl">🇸🇮 SLOVENŠČINA</option>
                                <option value="de">🇩🇪 DEUTSCH</option>
                                <option value="en">🇬🇧 ENGLISH</option>
                                <option value="it">🇮🇹 ITALIANO</option>
                                <option value="la">🇻🇦 LATINA</option>
                            </select>
                        </div>

                        <div className="space-y-2">
                            <label className="text-[10px] font-black text-blue-900 uppercase tracking-widest ml-1">Skrivnosti</label>
                            <select 
                                className="w-full bg-slate-50 border-2 border-slate-100 text-blue-950 p-4 rounded-2xl font-bold outline-none"
                                value={mysteryType}
                                onChange={(e) => setMysteryType(e.target.value)}
                            >
                                {Object.entries(MYSTERY_NAMES).map(([key, name]) => (
                                    <option key={key} value={key}>{name.toUpperCase()}</option>
                                ))}
                            </select>
                        </div>

                        <div className="pt-2">
                            <button
                                onClick={() => setIsRouletteMode(!isRouletteMode)}
                                className={`w-full flex items-center justify-between p-4 rounded-2xl font-black text-xs transition-all border-2 ${
                                    isRouletteMode ? 'bg-amber-400 border-amber-500 text-blue-950' : 'bg-slate-50 border-slate-100 text-slate-400'
                                }`}
                            >
                                <div className="flex items-center gap-2">
                                    <Icon name="dices" />
                                    JEZIKOVNA RULETA
                                </div>
                                <div className={`w-10 h-6 rounded-full relative transition-colors ${isRouletteMode ? 'bg-blue-900' : 'bg-slate-300'}`}>
                                    <div className={`absolute top-1 w-4 h-4 bg-white rounded-full transition-all ${isRouletteMode ? 'right-1' : 'left-1'}`} />
                                </div>
                            </button>
                        </div>
                    </div>

                    <button 
                        onClick={() => setStep(0)}
                        className="bg-amber-500 hover:bg-amber-600 text-blue-950 w-full max-w-xs py-5 rounded-2xl font-black text-xl shadow-2xl transition-transform active:scale-95 flex items-center justify-center border-b-8 border-amber-700"
                    >
                        <div className="mr-3"><Icon name="play" /></div>
                        ZAČNI MOLITEV
                    </button>
                </div>
            );

            const renderPrayerContent = () => {
                const p = PRAYERS[lang];

                if (step === 13) {
                    return (
                        <div className="text-center py-12 px-6 animate-fade-in">
                            <div className="text-amber-500 mb-6 flex justify-center"><Icon name="check" /></div>
                            <h2 className="text-3xl font-black text-blue-950 mb-4 uppercase">Bog bodi zahvaljen!</h2>
                            <p className="text-slate-600 mb-10 text-lg font-medium">Vseh pet desetk je zaključenih.</p>
                            <button 
                                onClick={() => { setStep(-1); setDecadeIndex(0); }}
                                className="bg-blue-900 hover:bg-blue-950 text-amber-400 w-full max-w-xs py-5 rounded-2xl font-black text-xl shadow-xl transition flex items-center justify-center mx-auto border-b-4 border-blue-950"
                            >
                                <div className="mr-3"><Icon name="refresh" /></div>
                                MENI / PONOVNO
                            </button>
                        </div>
                    );
                }

                let title = "";
                let content = null;
                let subtitle = "";

                if (isInsertLanguage) {
                    subtitle = `${decadeIndex + 1}. SKRIVNOST`;
                } else {
                    subtitle = `${decadeIndex + 1}. MYSTERY: ${currentMysteryText}`;
                    if (lang === 'it') subtitle = `${decadeIndex + 1}° MISTERO: ${currentMysteryText}`;
                    if (lang === 'la') subtitle = `MYSTERIUM ${decadeIndex + 1}: ${currentMysteryText}`;
                }

                if (step === 0) {
                    title = p.ocenasTitle;
                    content = <p className="text-xl md:text-2xl leading-relaxed font-black text-blue-950">{p.ocenas}</p>;
                } else if (step >= 1 && step <= 10) {
                    title = `${p.zdravaTitle} (${step}/10)`;
                    content = (
                        <p className="text-xl md:text-2xl leading-relaxed font-black text-blue-950">
                            {p.zdrava1}
                            {isInsertLanguage && <span className="text-amber-600 underline decoration-amber-200 decoration-4 underline-offset-4">{currentMysteryText}</span>}
                            {p.zdrava2}
                        </p>
                    );
                } else if (step === 11) {
                    title = p.slavaTitle;
                    content = <p className="text-xl md:text-2xl leading-relaxed font-black text-blue-950">{p.slava}</p>;
                } else if (step === 12) {
                    title = p.fatimaTitle;
                    content = <p className="text-xl md:text-2xl leading-relaxed font-black text-blue-950">{p.fatima}</p>;
                }

                return (
                    <div className="flex flex-col h-full animate-fade-in">
                        
                        {/* KARTICA Z MOLITVIJO */}
                        <div className="bg-white rounded-[2rem] p-8 shadow-2xl border-2 border-amber-50 mb-8 relative">
                            <div className="text-center mb-6 flex flex-col items-center">
                                <span className="px-4 py-1.5 bg-blue-50 text-blue-900 border border-blue-100 rounded-full text-[10px] font-black mb-6 uppercase tracking-widest">
                                    {subtitle}
                                </span>
                                <h2 className="text-2xl font-black text-blue-950 uppercase tracking-tighter">{title}</h2>
                            </div>
                            
                            <div className="min-h-[220px] flex items-center justify-center text-center">
                                {content}
                            </div>
                        </div>

                        {/* GLAVNI GUMB ZA NAPREJ */}
                        <div className="flex justify-center mb-12">
                            <button 
                                onClick={handleNextStep}
                                className="w-28 h-28 md:w-32 md:h-32 bg-gradient-to-br from-blue-700 to-blue-950 rounded-full shadow-2xl shadow-blue-900/40 flex flex-col items-center justify-center text-amber-400 transform transition active:scale-90 border-8 border-amber-300 relative group"
                            >
                                <span className="text-6xl drop-shadow-lg group-hover:scale-110 transition-transform">✟</span>
                                <div className="absolute -bottom-4 bg-amber-400 text-blue-950 px-5 py-1 rounded-full text-[12px] font-black uppercase tracking-widest border-2 border-white shadow-md">Naprej</div>
                            </button>
                        </div>

                        {/* LOKALNI NAPREDEK (JAGODE) */}
                        <div className="w-full px-10 overflow-visible mb-12">
                            <div className="flex justify-center items-center space-x-2 md:space-x-3">
                                {Array.from({ length: 13 }).map((_, i) => {
                                    const isCurrent = i === step;
                                    const isPassed = i < step;
                                    const isLarge = i === 0 || i === 11 || i === 12;
                                    
                                    return (
                                        <div 
                                        key={i} 
                                        className={`transition-all duration-300 rounded-full ${
                                            isLarge ? 'w-5 h-5 md:w-6 md:h-6' : 'w-3 h-3 md:w-4 md:h-4'
                                        } ${
                                            isCurrent ? 'bg-blue-700 ring-4 ring-amber-300 ring-offset-2 scale-150 shadow-lg shadow-blue-900/20' : 
                                            isPassed ? 'bg-amber-400 shadow-sm' : 'bg-slate-200'
                                        }`}
                                        />
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen flex flex-col items-center pb-12">
                    {/* GLAVA */}
                    <div className="w-full bg-blue-950 text-white p-5 flex items-center justify-between border-b-4 border-amber-500 sticky top-0 z-50 shadow-lg">
                        <button 
                            onClick={() => { setStep(-1); }}
                            className="text-amber-400 hover:text-white transition-colors p-1"
                        >
                            {step !== -1 ? <Icon name="book" /> : <div className="w-6" />}
                        </button>
                        
                        <span className="text-xl font-black text-amber-400 flex items-center tracking-tighter">
                            <span className="text-2xl mr-2">✟</span> ROŽNI VENEC
                        </span>

                        <div className="w-6" /> 
                    </div>

                    <div className="w-full max-w-md flex flex-col p-4 md:p-6">
                        
                        {step === -1 ? renderMainMenu() : renderPrayerContent()}

                        {/* GLOBALNI NAPREDEK */}
                        {step !== -1 && step !== 13 && (
                            <div className="mt-16 pt-8 border-t-2 border-slate-100">
                                <span className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-6 block text-center">Desetke</span>
                                <div className="flex justify-between items-center px-4">
                                    {[0, 1, 2, 3, 4].map(i => {
                                        const isActive = i === decadeIndex;
                                        const isPast = i < decadeIndex;
                                        return (
                                            <React.Fragment key={i}>
                                                <div className={`w-11 h-11 rounded-full flex items-center justify-center font-black text-sm border-2 transition-all duration-500 ${
                                                    isActive ? 'bg-blue-900 text-amber-400 border-amber-400 scale-125 shadow-xl z-10' :
                                                    isPast ? 'bg-amber-400 text-blue-950 border-amber-400' : 'bg-white text-slate-300 border-slate-100'
                                                }`}>
                                                    {i + 1}
                                                </div>
                                                {i < 4 && <div className={`flex-grow h-1.5 transition-colors duration-500 ${isPast ? 'bg-amber-400' : 'bg-slate-100'}`} />}
                                            </React.Fragment>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                    </div>

                    {/* NOGA */}
                    {step === -1 && (
                        <div className="mt-auto pt-10 px-8 text-slate-400 text-[10px] font-black text-center uppercase tracking-[0.25em] opacity-40 leading-relaxed">
                            Ave Maria ✟ Gratia Plena<br/>
                            Dominus Tecum
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
