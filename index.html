            const paths = {
                play: "M5 3l14 9-14 9V3z",
                refresh: "M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15",
                check: "M20 6L9 17l-5-5",
                book: "M4 19.5A2.5 2.5 0 016.5 17H20M4 19.5A2.5 2.5 0 006.5 22H20M4 19.5V3a1 1 0 011-1h15a1 1 0 011 1v19a1 1 0 01-1 1H6.5a2.5 2.5 0 01-2.5-2.5z",
                dices: "M3 3h7v7H3z M14 3h7v7h-7z M3 14h7v7H3z M14 14h7v7h-7z",
                arrowLeft: "M15 19l-7-7 7-7",
                arrowRight: "M9 5l7 7-7 7",
                eye: "M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z M12 15a3 3 0 100-6 3 3 0 000 6z"
            };
            return (
                <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <path d={paths[name]} />
                </svg>
            );
        };

        const getMysteryForToday = () => {
            const day = new Date().getDay(); 
            switch(day) {
                case 1: case 6: return 'veseli';
                case 2: case 5: return 'zalostni';
                case 4: return 'svetli';
                case 3: case 0: default: return 'castitljivi';
            }
        };

        function App() {
            const [lang, setLang] = useState('sl');
            const [isRoulettePrayer, setIsRoulettePrayer] = useState(false);
            const [isRouletteDecade, setIsRouletteDecade] = useState(false);
            const [mysteryType, setMysteryType] = useState(getMysteryForToday());
            
            // Faze in pogledi za popolno strukturo rožnega venca
            const [view, setView] = useState('menu'); // 'menu', 'prayer', 'finished'
            const [phase, setPhase] = useState('intro'); // 'intro', 'decades', 'outro'
            const [decadeIndex, setDecadeIndex] = useState(0); 
            const [step, setStep] = useState(0); 

            // Stanje za sliko trenutne skrivnosti (celozaslonski način)
            const [showMysteryImage, setShowMysteryImage] = useState(false);

            // Stanje za čudodelno svetinjo
            const [showMiraculous, setShowMiraculous] = useState(false);
            const [miraculousTriggers, setMiraculousTriggers] = useState([]);

            // Reference za zaznavanje drsenja s prstom (Swipe)
            const touchStartX = useRef(null);
            const touchStartY = useRef(null);

            // NOVO: Funkcija za taktilni odziv (Vibracija)
            const triggerVibration = useCallback((duration = 15) => {
                if (typeof window !== 'undefined' && window.navigator && window.navigator.vibrate) {
                    try {
                        window.navigator.vibrate(duration);
                    } catch (e) {
                        // Nekateri brskalniki ignorirajo, to je normalno
                    }
                }
            }, []);

            // Funkcija, ki ob zagonu izbere 3 naključne trenutke med desetkami
            const generateTriggers = useCallback(() => {
                const triggers = new Set();
                while(triggers.size < 3) {
                    triggers.add(Math.floor(Math.random() * 63) + 1); 
                }
                setMiraculousTriggers(Array.from(triggers));
            }, []);

            useEffect(() => {
                generateTriggers();
            }, [generateTriggers]);

            // Preverjanje, če moramo pokazati pop-up
            useEffect(() => {
                if (phase === 'decades' && !showMiraculous) {
                    const absoluteStep = decadeIndex * 13 + step;
                    if (miraculousTriggers.includes(absoluteStep)) {
                        setShowMiraculous(true);
                        setMiraculousTriggers(prev => prev.filter(t => t !== absoluteStep)); // Odstranimo, da se ne ponovi
                    }
                }
            }, [phase, decadeIndex, step, miraculousTriggers, showMiraculous]);

            // Samodejno zapiranje slike skrivnosti, ko se spremeni desetka
            useEffect(() => {
                setShowMysteryImage(false);
            }, [decadeIndex, phase]);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (view === 'prayer' && !showMiraculous) {
                        if (e.key === 'ArrowRight' || e.key === ' ') {
                            e.preventDefault();
                            triggerVibration(15);
                            handleNextStep();
                        } else if (e.key === 'ArrowLeft') {
                            e.preventDefault();
                            triggerVibration(10);
                            handlePrevStep();
                        }
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [view, phase, step, decadeIndex, lang, isRoulettePrayer, isRouletteDecade, showMiraculous, triggerVibration]);

            const currentMysteryText = MYSTERIES[mysteryType][lang][decadeIndex];
            const isInsertLanguage = lang === 'sl' || lang === 'de';

            const changeLanguageRandomly = useCallback(() => {
                setLang(currentLang => {
                    const langs = ['sl', 'de', 'en', 'it', 'la'];
                    const availableLangs = langs.filter(l => l !== currentLang);
                    return availableLangs[Math.floor(Math.random() * availableLangs.length)];
                });
            }, []);

            const handleNextStep = useCallback(() => {
                if (isRoulettePrayer) changeLanguageRandomly();

                if (phase === 'intro') {
                    if (step < 5) {
                        setStep(s => s + 1);
                    } else {
                        setPhase('decades');
                        setStep(0);
                    }
                } else if (phase === 'decades') {
                    if (step < 12) {
                        setStep(s => s + 1);
                    } else {
                        if (decadeIndex < 4) {
                            if (isRouletteDecade && !isRoulettePrayer) changeLanguageRandomly();
                            setDecadeIndex(prev => prev + 1);
                            setStep(0);
                        } else {
                            setPhase('outro'); 
                            setStep(0); 
                        }
                    }
                } else if (phase === 'outro') {
                    if (step < 7) {
                        setStep(s => s + 1);
                    } else {
                        setView('finished');
                    }
                }
            }, [phase, step, decadeIndex, isRoulettePrayer, isRouletteDecade, changeLanguageRandomly]);

            const handlePrevStep = useCallback(() => {
                if (phase === 'intro') {
                    if (step > 0) {
                        setStep(s => s - 1);
                    } else {
                        setView('menu'); 
                    }
                } else if (phase === 'decades') {
                    if (step > 0) {
                        setStep(s => s - 1);
                    } else {
                        if (decadeIndex > 0) {
                            setDecadeIndex(d => d - 1);
                            setStep(12);
                        } else {
                            setPhase('intro');
                            setStep(5);
                        }
                    }
                } else if (phase === 'outro') {
                    if (step > 0) {
                        setStep(s => s - 1);
                    } else {
                        setPhase('decades');
                        setStep(12);
                    }
                }
            }, [phase, step, decadeIndex]);

            // NOVO: Handlers za Swipe / Drsenje s prstom
            const onTouchStart = (e) => {
                touchStartX.current = e.touches[0].clientX;
                touchStartY.current = e.touches[0].clientY;
            };

            const onTouchEndHandler = (e) => {
                if (touchStartX.current === null || touchStartY.current === null) return;
                if (showMiraculous) return; // Zablokiraj drsenje, če je odprt modal s svetinjo

                const touchEndX = e.changedTouches[0].clientX;
                const touchEndY = e.changedTouches[0].clientY;

                const deltaX = touchStartX.current - touchEndX;
                const deltaY = touchStartY.current - touchEndY;

                // Preverimo, če gre za pretežno horizontalno drsenje in je dovolj dolgo (več kot 50px)
                if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 50) {
                    if (deltaX > 0) {
                        // Potez v levo -> Naslednja molitev
                        triggerVibration(15);
                        handleNextStep();
                    } else {
                        // Potez v desno -> Prejšnja molitev
                        triggerVibration(10);
                        handlePrevStep();
                    }
                }
                
                // Ponastavi reference za naslednji dotik
                touchStartX.current = null;
                touchStartY.current = null;
            };

            // Prikaz glavnega menija
            const renderMainMenu = () => (
                <div className="flex flex-col items-center py-6 px-4 space-y-6 animate-slide-up w-full max-w-sm mx-auto">
                    
                    {/* SVETA UMETNOST (Slika na vrhu) */}
                    <div className="relative w-48 h-48 md:w-56 md:h-56 mx-auto shadow-[0_15px_30px_rgba(0,0,0,0.25)] rounded-full border-[6px] border-[#d4af37] overflow-hidden bg-[#121c33] flex items-center justify-center">
                        {HOLY_ART_IMAGE ? (
                            <img src={HOLY_ART_IMAGE} alt="Holy Art" className="w-full h-full object-cover" />
                        ) : (
                            <div className="flex flex-col items-center justify-center w-full h-full bg-gradient-to-br from-[#1a294c] to-[#0a0f1c]">
                                <span className="text-6xl md:text-7xl text-[#d4af37] drop-shadow-md font-serif-holy mb-2">✟</span>
                                <span className="text-[10px] md:text-[11px] text-[#d4af37] font-bold tracking-[0.3em] uppercase opacity-90">Ave Maria</span>
                            </div>
                        )}
                        <div className="absolute inset-0 rounded-full shadow-[inset_0_0_20px_rgba(0,0,0,0.6)] pointer-events-none"></div>
                    </div>

                    <div className="text-center">
                        <h2 className="text-3xl font-serif-holy font-bold text-[#121c33] tracking-wide mb-1">Nastavitve</h2>
                        <p className="text-[#8b1a1a] font-medium text-sm italic">Pripravi se na zbrano molitev</p>
                    </div>

                    {/* Nastavitve (Meni kartica) */}
                    <div className="w-full space-y-4 bg-[#fcfaf5] p-6 rounded-2xl shadow-lg border border-[#e8dfc8] relative">
                        <div className="space-y-1.5">
                            <label className="text-[10px] font-bold text-[#8b1a1a] uppercase tracking-widest ml-1 opacity-90">Jezik</label>
                            <div className="relative">
                                <select 
                                    className="w-full bg-[#f6f3eb] border border-[#d2c5aa] text-[#2c1810] p-3.5 rounded-xl font-bold outline-none appearance-none focus:border-[#d4af37] focus:ring-2 focus:ring-[#d4af37]/30 transition-all cursor-pointer shadow-sm"
                                    value={lang}
                                    onChange={(e) => setLang(e.target.value)}
                                >
                                    <option value="sl">🇸🇮 SLOVENŠČINA</option>
                                    <option value="de">🇩🇪 DEUTSCH</option>
                                    <option value="en">🇬🇧 ENGLISH</option>
                                    <option value="it">🇮🇹 ITALIANO</option>
                                    <option value="la">🇻🇦 LATINA</option>
                                </select>
                                <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-[#8b1a1a]">
                                    <Icon name="arrowRight" className="w-4 h-4 rotate-90" />
                                </div>
                            </div>
                        </div>

                        <div className="space-y-1.5">
                            <label className="text-[10px] font-bold text-[#8b1a1a] uppercase tracking-widest ml-1 opacity-90">Skrivnosti (Za danes)</label>
                            <div className="relative">
                                <select 
                                    className="w-full bg-[#f6f3eb] border border-[#d2c5aa] text-[#2c1810] p-3.5 rounded-xl font-bold outline-none appearance-none focus:border-[#d4af37] focus:ring-2 focus:ring-[#d4af37]/30 transition-all cursor-pointer shadow-sm"
                                    value={mysteryType}
                                    onChange={(e) => setMysteryType(e.target.value)}
                                >
                                    {Object.entries(MYSTERY_NAMES).map(([key, name]) => (
                                        <option key={key} value={key}>{name.toUpperCase()}</option>
                                    ))}
                                </select>
                                <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-[#8b1a1a]">
                                    <Icon name="arrowRight" className="w-4 h-4 rotate-90" />
                                </div>
                            </div>
                        </div>

                        <div className="pt-2 space-y-2">
                            <button
                                onClick={() => {
                                    triggerVibration(10);
                                    setIsRoulettePrayer(!isRoulettePrayer);
                                    if (!isRoulettePrayer) setIsRouletteDecade(false); 
                                }}
                                className={`w-full flex items-center justify-between p-3.5 rounded-xl font-black text-[10px] md:text-xs transition-all duration-300 border ${
                                    isRoulettePrayer 
                                    ? 'bg-[#d4af37] border-[#b8952a] text-white shadow-md' 
                                    : 'bg-transparent border-[#d2c5aa] text-[#6d5a42] hover:bg-[#f6f3eb]'
                                }`}
                            >
                                <div className="flex items-center gap-2 md:gap-3">
                                    <Icon name="dices" className={isRoulettePrayer ? "text-white" : "text-[#8b1a1a]"} />
                                    RULETA: VSAKA MOLITEV
                                </div>
                                <div className={`w-10 h-6 rounded-full relative transition-colors duration-300 shadow-inner ${isRoulettePrayer ? 'bg-[#121c33]' : 'bg-[#d2c5aa]'}`}>
                                    <div className={`absolute top-1 w-4 h-4 bg-white rounded-full transition-all duration-300 shadow-sm ${isRoulettePrayer ? 'left-5' : 'left-1'}`} />
                                </div>
                            </button>

                            <button
                                onClick={() => {
                                    triggerVibration(10);
                                    setIsRouletteDecade(!isRouletteDecade);
                                    if (!isRouletteDecade) setIsRoulettePrayer(false); 
                                }}
                                className={`w-full flex items-center justify-between p-3.5 rounded-xl font-black text-[10px] md:text-xs transition-all duration-300 border ${
                                    isRouletteDecade 
                                    ? 'bg-[#d4af37] border-[#b8952a] text-white shadow-md' 
                                    : 'bg-transparent border-[#d2c5aa] text-[#6d5a42] hover:bg-[#f6f3eb]'
                                }`}
                            >
                                <div className="flex items-center gap-2 md:gap-3">
                                    <Icon name="dices" className={isRouletteDecade ? "text-white" : "text-[#8b1a1a]"} />
                                    RULETA: VSAKA DESETKA
                                </div>
                                <div className={`w-10 h-6 rounded-full relative transition-colors duration-300 shadow-inner ${isRouletteDecade ? 'bg-[#121c33]' : 'bg-[#d2c5aa]'}`}>
                                    <div className={`absolute top-1 w-4 h-4 bg-white rounded-full transition-all duration-300 shadow-sm ${isRouletteDecade ? 'left-5' : 'left-1'}`} />
                                </div>
                            </button>
                        </div>
                    </div>

                    <div className="w-full flex flex-col gap-3 mt-2">
                        <button 
                            onClick={() => {
                                triggerVibration(20);
                                if (phase === 'intro' && step === 0 && (isRoulettePrayer || isRouletteDecade)) {
                                    changeLanguageRandomly();
                                }
                                setView('prayer');
                            }}
                            className="group bg-gradient-to-b from-[#8b1a1a] to-[#5c0e0e] hover:from-[#a01e1e] hover:to-[#731212] text-[#f4e0aa] w-full py-4 rounded-xl font-serif-holy font-bold text-xl shadow-lg transition-all active:scale-95 flex items-center justify-center border-b-4 border-[#3e0808]"
                        >
                            <div className="mr-3 transform group-hover:scale-110 transition-transform"><Icon name="play" /></div>
                            {(phase !== 'intro' || step > 0 || decadeIndex > 0) ? "NADALJUJ MOLITEV" : "ZAČNI MOLITEV"}
                        </button>
                        
                        {(phase !== 'intro' || step > 0 || decadeIndex > 0) && (
                            <button 
                                onClick={() => { triggerVibration(10); setPhase('intro'); setStep(0); setDecadeIndex(0); generateTriggers(); setView('prayer'); }}
                                className="group bg-transparent hover:bg-[#e8dfc8] text-[#3e2723] w-full py-3 rounded-xl font-bold text-xs shadow-sm transition-all active:scale-95 flex items-center justify-center border border-[#d2c5aa]"
                            >
                                <div className="mr-2 transform group-hover:-rotate-180 transition-transform duration-500"><Icon name="refresh" className="w-4 h-4" /></div>
                                ZAČNI OD ZAČETKA
                            </button>
                        )}
                    </div>
                </div>
            );

            // Prikaz same molitve
            const renderPrayerContent = () => {
                const p = PRAYERS[lang];

                if (view === 'finished') {
                    return (
                        <div className="text-center py-12 px-6 animate-slide-up flex flex-col justify-center h-full">
                            <div className="w-24 h-24 bg-[#121c33] rounded-full flex items-center justify-center mx-auto mb-6 shadow-xl border-[4px] border-[#d4af37] text-[#d4af37]">
                                <Icon name="check" className="w-12 h-12" />
                            </div>
                            <h2 className="text-4xl font-serif-holy font-bold text-[#8b1a1a] mb-3 uppercase tracking-tight">Bog bodi zahvaljen!</h2>
                            <p className="text-[#3e2723] mb-10 text-lg font-medium italic">Sveti rožni venec je zaključen.</p>
                            <button 
                                onClick={() => { triggerVibration(10); setPhase('intro'); setStep(0); setDecadeIndex(0); generateTriggers(); setView('menu'); }}
                                className="group bg-gradient-to-b from-[#121c33] to-[#0a0f1c] hover:from-[#1a294c] hover:to-[#121c33] text-[#d4af37] w-full max-w-xs py-4 rounded-xl font-serif-holy font-bold text-lg shadow-lg transition flex items-center justify-center mx-auto border-b-4 border-[#000]"
                            >
                                <div className="mr-3 transform group-hover:rotate-180 transition-transform duration-500"><Icon name="refresh" /></div>
                                MENI / PONOVNO
                            </button>
                        </div>
                    );
                }

                let title = "";
                let content = null;
                let subtitle = "";

                // Nastavitev podnaslova glede na fazo in jezik
                if (phase === 'intro') {
                    if (lang === 'sl') subtitle = "UVOD";
                    else if (lang === 'de') subtitle = "EINLEITUNG";
                    else if (lang === 'it') subtitle = "INTRODUZIONE";
                    else if (lang === 'la') subtitle = "INTRODUCTIO";
                    else subtitle = "INTRODUCTION";
                } else if (phase === 'outro') {
                    if (lang === 'sl') subtitle = "ZAKLJUČEK";
                    else if (lang === 'de') subtitle = "ABSCHLUSS";
                    else if (lang === 'it') subtitle = "CONCLUSIONE";
                    else if (lang === 'la') subtitle = "CONCLUSIO";
                    else subtitle = "CONCLUSION";
                } else if (phase === 'decades') {
                    if (isInsertLanguage) {
                        subtitle = lang === 'de' ? `${decadeIndex + 1}. GEHEIMNIS` : `${decadeIndex + 1}. SKRIVNOST`;
                    } else {
                        subtitle = `${decadeIndex + 1}. MYSTERY: ${currentMysteryText}`;
                        if (lang === 'it') subtitle = `${decadeIndex + 1}° MISTERO: ${currentMysteryText}`;
                        if (lang === 'la') subtitle = `MYSTERIUM ${decadeIndex + 1}: ${currentMysteryText}`;
                    }
                }

                // Določanje vsebine glede na fazo in korak
                if (phase === 'intro') {
                    if (step === 0) {
                        title = p.credoTitle;
                        content = <p className="text-base md:text-lg leading-relaxed font-serif-holy font-semibold text-[#2c1810]">{p.credo}</p>;
                    } else if (step === 1) {
                        title = p.ocenasTitle;
                        content = <p className="text-base md:text-lg leading-relaxed font-serif-holy font-semibold text-[#2c1810]">{p.ocenas}</p>;
                    } else if (step >= 2 && step <= 4) {
                        title = p.zdravaTitle;
                        content = (
                            <p className="text-base md:text-lg leading-relaxed font-serif-holy font-semibold text-[#2c1810]">
                                {p.zdrava1}{lang === 'sl' ? ", " : ""}{lang === 'sl' && <span className="text-[#8b1a1a] bg-[#fcfaf5] px-1 rounded underline decoration-[#d4af37] decoration-2 underline-offset-4 font-bold">{INTRO_INSERTS[mysteryType][step - 2]}</span>}{p.zdrava2}
                            </p>
                        );
                    } else if (step === 5) {
                        title = p.slavaTitle;
                        content = <p className="text-base md:text-lg leading-relaxed font-serif-holy font-semibold text-[#2c1810]">{p.slava}</p>;
                    }
                } else if (phase === 'decades') {
                    const tClass = showMysteryImage 
                        ? "text-lg md:text-xl leading-relaxed font-serif-holy font-medium text-[#fcfaf5] drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]" 
                        : "text-base md:text-lg leading-relaxed font-serif-holy font-semibold text-[#2c1810]";
                    const hlClass = showMysteryImage 
                        ? "text-[#d4af37] px-1 rounded font-bold underline decoration-[#d4af37] decoration-2 underline-offset-4 bg-black/40 backdrop-blur-sm shadow-sm" 
                        : "text-[#8b1a1a] bg-[#fcfaf5] px-1 rounded underline decoration-[#d4af37] decoration-2 underline-offset-4 font-bold";

                    if (step === 0) {
                        title = p.ocenasTitle;
                        content = <p className={tClass}>{p.ocenas}</p>;
                    } else if (step >= 1 && step <= 10) {
                        title = p.zdravaTitle;
                        content = (
                            <p className={tClass}>
                                {p.zdrava1}{isInsertLanguage ? ", " : ""}{isInsertLanguage && <span className={hlClass}>{currentMysteryText}</span>}{p.zdrava2}
                            </p>
                        );
                    } else if (step === 11) {
                        title = p.slavaTitle;
                        content = <p className={tClass}>{p.slava}</p>;
                    } else if (step === 12) {
                        title = p.fatimaTitle;
                        content = <p className={tClass}>{p.fatima}</p>;
                    }
                } else if (phase === 'outro') {
                    if (step === 0) {
                        title = p.benedictTitle;
                        content = <p className="text-base md:text-lg leading-relaxed font-serif-holy font-semibold text-[#2c1810]">{p.benedict}</p>;
                    } else if (step === 1) {
                        title = p.ocenasTitle;
                        content = <p className="text-base md:text-lg leading-relaxed font-serif-holy font-semibold text-[#2c1810]">{p.ocenas}</p>;
                    } else if (step >= 2 && step <= 4) {
                        title = p.zdravaTitle;
                        content = (
                            <p className="text-base md:text-lg leading-relaxed font-serif-holy font-semibold text-[#2c1810]">
                                {p.zdrava1}{p.zdrava2}
                            </p>
                        );
                    } else if (step === 5) {
                        title = p.slavaTitle;
                        content = <p className="text-base md:text-lg leading-relaxed font-serif-holy font-semibold text-[#2c1810]">{p.slava}</p>;
                    } else if (step === 6) {
                        title = p.salveTitle;
                        content = <p className="text-base md:text-lg leading-relaxed font-serif-holy font-semibold text-[#2c1810]">{p.salve}</p>;
                    } else if (step === 7) {
                        title = p.michaelTitle;
                        content = <p className="text-base md:text-lg leading-relaxed font-serif-holy font-semibold text-[#2c1810]">{p.michael}</p>;
                    }
                }

                // Generiranje kroglic za zgornji trak glede na fazo
                let beadArray = [];
                if (phase === 'intro') beadArray = Array.from({ length: 6 });
                else if (phase === 'decades') beadArray = Array.from({ length: 13 });
                else if (phase === 'outro') beadArray = Array.from({ length: 8 });

                return (
                    <div className="flex flex-col h-full animate-fade-in w-full">
                        
                        {/* KOMPAKTEN ZGORNJI DEL: Domov + Napredek v eni vrstici */}
                        <div className="w-full flex justify-between items-center mb-3 mt-1">
                            {/* Gumb Meni / Domov */}
                            <button 
                                onClick={() => { triggerVibration(10); setView('menu'); }}
                                className="w-10 h-10 bg-[#fcfaf5] rounded-full shadow-sm flex items-center justify-center text-[#8b1a1a] hover:text-[#121c33] transform transition-all active:scale-90 border border-[#d2c5aa] flex-shrink-0 relative z-[60]"
                                aria-label="Nazaj na meni"
                            >
                                <Icon name="book" className="w-5 h-5" />
                            </button>

                            {/* Tradicionalen napredek */}
                            <div className="flex flex-col items-center gap-1.5 relative z-[60]">
                                {/* Desetke */}
                                <div className="flex gap-1.5">
                                    {[0, 1, 2, 3, 4].map(i => {
                                        let stateClass = 'w-3 bg-[#d2c5aa]/60';
                                        if (phase === 'outro' || (phase === 'decades' && i < decadeIndex)) {
                                            stateClass = 'w-3 bg-[#d4af37]';
                                        } else if (phase === 'decades' && i === decadeIndex) {
                                            stateClass = 'w-6 bg-[#8b1a1a] shadow-sm';
                                        }
                                        return <div key={`d-${i}`} className={`h-1.5 rounded-sm transition-all duration-500 ${stateClass}`} />;
                                    })}
                                </div>
                                
                                {/* Jagode */}
                                <div className="flex gap-1 items-center">
                                    {beadArray.map((_, i) => {
                                        let isLarge = false;
                                        if (phase === 'intro') isLarge = (i === 0 || i === 1 || i === 5);
                                        else if (phase === 'decades') isLarge = (i === 0 || i === 11 || i === 12);
                                        else if (phase === 'outro') isLarge = (i === 0 || i === 1 || i === 5 || i === 6 || i === 7);

                                        return (
                                            <div 
                                                key={`b-${i}`}
                                                className={`rounded-full transition-all duration-300 ${
                                                    isLarge ? 'w-1.5 h-1.5' : 'w-1 h-1'
                                                } ${
                                                    i === step ? 'bg-[#121c33] ring-1 ring-[#d4af37] ring-offset-1 ring-offset-[#f6f3eb] scale-125' : 
                                                    i < step ? 'bg-[#8b1a1a]/60' : 'bg-[#d2c5aa]'
                                                }`}
                                            />
                                        );
                                    })}
                                </div>
                            </div>

                            {/* Gumb za preklop slike ali neviden placeholder */}
                            <div className="w-10 h-10 flex-shrink-0 flex justify-end relative z-[60]">
                                {phase === 'decades' && (
                                    <button 
                                        onClick={() => { triggerVibration(10); setShowMysteryImage(!showMysteryImage); }}
                                        className={`w-10 h-10 rounded-full shadow-sm flex items-center justify-center transform transition-all active:scale-90 border ${showMysteryImage ? 'bg-[#121c33] text-[#d4af37] border-[#121c33]' : 'bg-[#fcfaf5] text-[#8b1a1a] hover:text-[#121c33] border-[#d2c5aa]'}`}
                                        aria-label="Prikaži sliko"
                                    >
                                        <Icon name="eye" className="w-5 h-5" />
                                    </button>
                                )}
                            </div>
                        </div>
                        
                        {/* KARTICA Z MOLITVIJO (ali slika, če je vklopljena) */}
                        {!showMysteryImage ? (
                            <div className="bg-[#fdfbf7] rounded-xl p-5 md:p-8 pt-6 md:pt-8 pb-36 md:pb-40 shadow-xl border border-[#d4af37]/40 relative overflow-y-auto flex-grow flex flex-col justify-start z-10">
                                <div className="absolute top-0 left-0 w-16 h-16 border-t-4 border-l-4 border-[#d4af37]/20 rounded-tl-xl m-2 pointer-events-none"></div>
                                <div className="absolute top-0 right-0 w-16 h-16 border-t-4 border-r-4 border-[#d4af37]/20 rounded-tr-xl m-2 pointer-events-none"></div>

                                <div className="text-center mb-4 flex flex-col items-center relative z-10">
                                    <span className="px-3 py-1 bg-[#121c33] text-[#d4af37] rounded-sm text-[9px] font-bold mb-3 uppercase tracking-[0.2em] shadow-sm">
                                        {subtitle}
                                    </span>
                                    <h2 className="text-xl md:text-2xl font-serif-holy font-bold text-[#8b1a1a] uppercase tracking-tight drop-shadow-sm">{title}</h2>
                                </div>
                                
                                <div className="block text-center relative z-10 mt-1">
                                    <div className="animate-fade-in" key={`${phase}-${decadeIndex}-${step}-${lang}`}>
                                        {content}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="rounded-xl shadow-2xl relative overflow-hidden flex-grow flex flex-col justify-center items-center border border-[#d4af37]/50 animate-fade-in bg-black z-10">
                                {MYSTERY_IMAGES[mysteryType][decadeIndex] ? (
                                    <img src={MYSTERY_IMAGES[mysteryType][decadeIndex]} className="absolute inset-0 w-full h-full object-cover animate-fade-in" />
                                ) : (
                                    <div className="absolute inset-0 bg-gradient-to-br from-[#121c33] to-[#0a0f1c]"></div>
                                )}
                                
                                {/* Rahla senca zgoraj in spodaj, da so gumbi vedno jasno vidni ne glede na sliko */}
                                <div className="absolute top-0 left-0 w-full h-24 bg-gradient-to-b from-black/40 to-transparent pointer-events-none"></div>
                                <div className="absolute bottom-0 left-0 w-full h-32 bg-gradient-to-t from-black/50 to-transparent pointer-events-none"></div>
                            </div>
                        )}

                        {/* FLOATING NAVIGACIJSKI GUMBI */}
                        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-lg px-4 md:px-6 flex justify-between items-end pointer-events-none z-50">
                            <button 
                                onClick={() => { triggerVibration(10); handlePrevStep(); }}
                                className="w-12 h-12 bg-[#fcfaf5] rounded-full shadow-lg flex items-center justify-center text-[#6d5a42] hover:text-[#8b1a1a] transform transition-all active:scale-90 border border-[#d2c5aa] pointer-events-auto mb-2 md:mb-4"
                                aria-label="Nazaj"
                            >
                                <Icon name="arrowLeft" className="w-6 h-6" />
                            </button>

                            <button 
                                onClick={() => { triggerVibration(15); handleNextStep(); }}
                                className="w-20 h-20 md:w-24 md:h-24 rounded-full shadow-[0_10px_25px_rgba(0,0,0,0.3)] flex items-center justify-center text-[#d4af37] transform transition-all active:scale-95 border-[4px] border-[#d4af37] group pointer-events-auto relative overflow-hidden bg-gradient-to-br from-[#8b1a1a] to-[#4a0e0e]"
                            >
                                {CUSTOM_BEAD_IMAGE ? (
                                    <img src={CUSTOM_BEAD_IMAGE} alt="Naprej" className="absolute inset-0 w-full h-full object-cover rounded-full" />
                                ) : (
                                    <span className="text-4xl md:text-5xl drop-shadow-md group-hover:scale-110 group-active:scale-90 transition-transform duration-300 font-serif-holy relative z-10">✟</span>
                                )}
                                {CUSTOM_BEAD_IMAGE && <div className="absolute inset-0 bg-black/10 group-active:bg-black/30 transition-colors pointer-events-none rounded-full"></div>}
                            </button>
                        </div>
                    </div>
                );
            };

            return (
                <div 
                    className={`min-h-screen flex flex-col items-center ${view === 'menu' ? 'pb-12' : 'pb-4'}`}
                    onTouchStart={view === 'prayer' ? onTouchStart : undefined}
                    onTouchEnd={view === 'prayer' ? onTouchEndHandler : undefined}
                >
                    {view === 'menu' && (
                        <div className="w-full bg-[#121c33] text-[#d4af37] p-4 flex items-center justify-center border-b-[4px] border-[#d4af37] sticky top-0 z-50 shadow-lg">
                            <span className="text-xl md:text-2xl font-serif-holy font-bold flex items-center tracking-widest uppercase">
                                <span className="text-2xl mr-2 text-[#f6f3eb]">✟</span> ROŽNI VENEC
                            </span>
                        </div>
                    )}

                    <div className={`w-full max-w-lg flex flex-col px-4 md:px-6 ${view === 'menu' ? 'mt-4 md:mt-6' : 'mt-2 h-[95vh]'}`}>
                        {view === 'menu' ? renderMainMenu() : renderPrayerContent()}
                    </div>

                    {view === 'menu' && (
                        <div className="mt-auto pt-8 px-8 text-[#8b1a1a] text-[10px] font-bold text-center uppercase tracking-[0.3em] opacity-70 leading-loose">
                            Ave Maria ✟ Gratia Plena<br/>
                            Dominus Tecum
                        </div>
                    )}

                    {/* MODAL ZA ČUDODELNO SVETINJO */}
                    {showMiraculous && (
                        <div className="fixed inset-0 bg-[#121c33]/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4 animate-fade-in">
                            <div className="bg-[#fdfbf7] p-8 rounded-2xl max-w-sm w-full shadow-2xl border-2 border-[#d4af37] text-center relative overflow-hidden transform transition-all animate-slide-up">
                                <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-[#d4af37] via-[#f4e0aa] to-[#d4af37]"></div>
                                
                                <div className="w-20 h-28 mx-auto mb-6 bg-gradient-to-br from-[#121c33] to-[#0a0f1c] rounded-[40%] border-[3px] border-[#d4af37] flex items-center justify-center shadow-lg relative overflow-hidden">
                                    {MIRACULOUS_MEDAL_IMAGE ? (
                                        <img src={MIRACULOUS_MEDAL_IMAGE} alt="Čudodelna svetinja" className="w-full h-full object-cover" />
                                    ) : (
                                        <span className="text-4xl filter drop-shadow-md">🏅</span>
                                    )}
                                    <div className="absolute inset-0 shadow-[inset_0_0_15px_rgba(0,0,0,0.5)] rounded-[40%] pointer-events-none"></div>
                                </div>
                                
                                <h3 className="text-xl font-serif-holy font-bold text-[#8b1a1a] mb-4 uppercase tracking-wider">{PRAYERS[lang].miraculousTitle}</h3>
                                <p className="text-lg md:text-xl font-serif-holy font-bold text-[#2c1810] mb-8 italic px-2">
                                    "{PRAYERS[lang].miraculous}"
                                </p>
                                
                                <button 
                                    onClick={() => { triggerVibration(10); setShowMiraculous(false); }}
                                    className="bg-gradient-to-b from-[#8b1a1a] to-[#5c0e0e] text-[#f4e0aa] w-full py-4 rounded-xl font-serif-holy font-bold text-lg shadow-lg hover:from-[#a01e1e] hover:to-[#731212] transition-colors border-b-4 border-[#3e0808] active:translate-y-1 active:border-b-0"
                                >
                                    AMEN
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
