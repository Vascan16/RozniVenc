    <!-- Elementa pro bibliothecis (CDN) - ZAMRZNJENE VERZIJE -->

    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

    <style>
        /* Dodana klasična serifna pisava (Playfair Display) za naslove in tradicionalni občutek */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&family=Inter:wght@400;500;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            background-color: #f6f3eb; /* Pergamentno ozadje */
            background-image: radial-gradient(#e5dec8 1px, transparent 1px);
            background-size: 32px 32px;
        }

        .font-serif-holy {
            font-family: 'Playfair Display', serif;
        }
        
        /* Animacije */
        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .animate-slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .pulse-soft { animation: pulseSoft 2.5s infinite; }
        
        @keyframes fadeIn { 
            from { opacity: 0; } 
            to { opacity: 1; } 
        }
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        @keyframes pulseSoft {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(212, 175, 55, 0); }
        }

        /* Katoliške barve (Custom Tailwind config using arbitrary values, no extra CSS needed) */
        /* Zlata: #d4af37, Marijina modra: #121c33, Rdeča (kardinalska): #8b1a1a, Pergament: #fdfbf7 */
    </style>
</head>
<body class="text-[#3e2723] selection:bg-[#d4af37] selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // =========================================================================
        // NASTAVITVE SLIK (Tukaj lahko spremeniš slike)
        // =========================================================================
        
        // Slika svete umetnosti na začetnem zaslonu. Pusti prazno ("") za čudovit privzet videz!
        const HOLY_ART_IMAGE = "";
        
        // Slika za gumb (jagodo) naprej. Če pustiš prazno (""), bo uporabljen privzet tradicionalen gumb.
        // Primer uporabe: const CUSTOM_BEAD_IMAGE = "https://nekastran.si/slika_jagode.jpg";
        const CUSTOM_BEAD_IMAGE = ""; 

        // =========================================================================

        // --- DATA BAZA PRECES ET MYSTERIA ---
        const PRAYERS = {
            sl: {
                ocenasTitle: "Oče naš",
                ocenas: "Oče naš, ki si v nebesih, posvečeno bodi tvoje ime, pridi k nam tvoje kraljestvo, zgodi se tvoja volja kakor v nebesih tako na zemlji. Daj nam danes naš vsakdanji kruh in odpusti nam naše dolge, kakor tudi mi odpuščamo svojim dolžnikom, in ne vpelji nas v skušnjavo, temveč reši nas hudega. Amen.",
                zdravaTitle: "Zdrava Marija",
                zdrava1: "Zdrava Marija, milosti polna, Gospod je s teboj, blagoslovljena si med ženami in blagoslovljen je sad tvojega telesa, Jezus",
                zdrava2: ". Sveta Marija, Mati božja, prosi za nas grešnike zdaj in ob naši smrtni uri. Amen.",
                slavaTitle: "Slava Očetu",
                slava: "Slava Očetu in Sinu in Svetemu Duhu, kakor je bilo v začetku, tako zdaj in vselej in vekomaj. Amen.",

                fatima: "O moj Jezus, odpusti nam naše grehe, obvaruj nas peklenskega ognja in privedi v nebesa vse duše, posebno še tiste, ki so najbolj potrebne tvojega usmiljenja.",

                zdrava2: ". Heilige Maria, Mutter Gottes, bitte für uns Sünder jetzt und in der Stunde unseres Todes. Amen.",
                slavaTitle: "Ehre sei dem Vater",
                slava: "Ehre sei dem Vater und dem Sohn und dem Heiligen Geist, wie im Anfang, so auch jetzt und alle Zeit und in Ewigkeit. Amen.",

            },
            en: {

                fatimaTitle: "O my Jesus",

            },
            it: {
                ocenasTitle: "Padre nostro",
                ocenas: "Padre nostro, che sei nei cieli, sia santificato il tuo nome, venga il tuo regno, sia fatta la tua volontà, come in cielo così in terra. Dacci oggi il nostro pane quotidiano, e rimetti a noi i nostri debiti come anche noi li rimettiamo ai nostri debitori, e non abbandonarci alla tentazione, ma liberaci dal male. Amen.",
                zdravaTitle: "Ave Maria",
                zdrava1: "Ave o Maria, piena di grazia, il Signore è con te. Tu sei benedetta fra le donne e benedetto è il frutto del tuo seno, Gesù",
                zdrava2: ". Santa Maria, Madre di Dio, prega per noi peccatori, adesso e nell'ora della nostra morte. Amen.",
                slavaTitle: "Gloria al Padre",
                slava: "Gloria al Padre e al Figlio e allo Spirito Santo. Come era nel principio, ora e sempre, nei secoli dei secoli. Amen.",
                fatimaTitle: "O Gesù mio",
                fatima: "O Gesù mio, perdona le nostre colpe, preservaci dal fuoco dell'inferno, porta in cielo tutte le anime, specialmente le più bisognose della tua misericordia.",
            },
            la: {
                ocenasTitle: "Pater noster",
                ocenas: "Pater noster, qui es in caelis, sanctificetur nomen tuum. Adveniat regnum tuum. Fiat voluntas tua, sicut in caelo et in terra. Panem nostrum quotidianum da nobis hodie, et dimitte nobis debita nostra sicut et nos dimittimus debitoribus nostris. Et ne nos inducas in tentationem, sed libera nos a malo. Amen.",
                zdravaTitle: "Ave Maria",
                zdrava1: "Ave Maria, gratia plena, Dominus tecum. Benedicta tu in mulieribus, et benedictus fructus ventris tui, Iesus",
                zdrava2: ". Sancta Maria, Mater Dei, ora pro nobis peccatoribus, nunc, et in hora mortis nostrae. Amen.",
                slavaTitle: "Gloria Patri",
                slava: "Gloria Patri, et Filio, et Spiritui Sancto. Sicut erat in principio, et nunc, et semper, et in saecula saeculorum. Amen.",
                fatimaTitle: "Domine Iesu",
                fatima: "Domine Iesu, dimitte nobis debita nostra, salva nos ab igne inferiori, perduc in caelum omnes animas, praesertim eas, quae misericordiae tuae maxime indigent.",
            }
        };

        const MYSTERIES = {
            veseli: {
                sl: [", ki si ga Devica od Svetega Duha spočela", ", ki si ga Devica k Elizabeti nosila", ", ki si ga Devica rodila", ", ki si ga Devica v templju darovala", ", ki si ga Devica v templju našla"],
                de: [", den du, o Jungfrau, vom Heiligen Geist empfangen hast", ", den du, o Jungfrau, zu Elisabeth getragen hast", ", den du, o Jungfrau, geboren hast", ", den du, o Jungfrau, im Tempel aufgeopfert hast", ", den du, o Jungfrau, im Tempel wiedergefunden hast"],
                en: ["The Annunciation", "The Visitation", "The Nativity", "The Presentation", "The Finding of Jesus in the Temple"],
                it: ["L'Annunciazione", "La Visitazione", "La Nascita di Gesù", "La Presentazione al Tempio", "Il Ritrovamento nel Tempio"],
                la: ["Annuntiatio", "Visitatio", "Nativitas", "Praesentatio in Templo", "Inventio in Templo"]
            },
            svetli: {
                sl: [", ki je bil krščen v reki Jordan", ", ki je v Kani Galilejski naredil prvi čudež", ", ki je oznanjal božje kraljestvo", ", ki je na gori Tabor pokazal svoje veličastvo", ", ki je postavil sveto rešnjo telo"],
                de: [", der von Johannes getauft worden ist", ", der sich bei der Hochzeit in Kana offenbart hat", ", der uns das Reich Gottes verkündet hat", ", der auf dem Berg verklärt worden ist", ", der uns die Eucharistie geschenkt hat"],
                en: ["The Baptism in the Jordan", "The Wedding Feast at Cana", "The Proclamation of the Kingdom", "The Transfiguration", "The Institution of the Eucharist"],
                it: ["Il Battesimo nel Giordano", "Le Nozze di Cana", "L'Annuncio del Regno di Dio", "La Trasfigurazione", "L'Istituzione dell'Eucaristia"],
                la: ["Baptismus in Iordane", "Nuptiae in Cana", "Proclamatio Regni Dei", "Transfiguratio", "Institutio Eucharistiae"]
            },
            zalostni: {
                sl: [", ki je za nas krvavi pot potil", ", ki je bil za nas bičan", ", ki je bil za nas s trnjem kronan", ", ki je za nas težki križ nesel", ", ki je bil za nas križan"],
                de: [", der für uns Blut geschwitzt hat", ", der für uns gegeißelt worden ist", ", der für uns mit Dornen gekrönt worden ist", ", der für uns das schwere Kreuz getragen hat", ", der für uns gekreuzigt worden ist"],
                en: ["The Agony in the Garden", "The Scourging at the Pillar", "The Crowning with Thorns", "The Carrying of the Cross", "The Crucifixion"],
                it: ["L'Agonia nell'Orto", "La Flagellazione", "L'Incoronazione di Spine", "La Salita al Calvario", "La Crocifissione e Morte"],
                la: ["Agonia in Horto", "Flagellatio", "Coronatio Spinis", "Baiulatio Crucis", "Crucifixio et Mors"]
            },
            castitljivi: {
                sl: [", ki je od mrtvih vstal", ", ki je v nebesa šel", ", ki je Svetega Duha poslal", ", ki je tebe, Devica, v nebesa vzel", ", ki je tebe, Devica, v nebesih kronal"],
                de: [", der von den Toten auferstanden ist", ", der in den Himmel aufgefahren ist", ", der uns den Heiligen Geist gesandt hat", ", der dich, o Jungfrau, in den Himmel aufgenommen hat", ", der dich, o Jungfrau, im Himmel gekrönt hat"],
                en: ["The Resurrection", "The Ascension", "The Descent of the Holy Spirit", "The Assumption of Mary", "The Coronation of the Virgin"],
                it: ["La Risurrezione", "L'Ascensione", "La Discesa dello Spirito Santo", "L'Assunzione di Maria", "L'Incoronazione di Maria"],
                la: ["Resurrectio", "Ascensio", "Descensus Spiritus Sancti", "Assumptio", "Coronatio in Caelo"]
            }
        };

        const MYSTERY_NAMES = {
            veseli: "Veseli del",
            svetli: "Svetli del",
            zalostni: "Žalostni del",
            castitljivi: "Častitljivi del"
        };

        // --- IMAGINES ET ICONES ---
        const Icon = ({ name, className = "" }) => {
            const paths = {
                play: "M5 3l14 9-14 9V3z",
                refresh: "M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15",
                check: "M20 6L9 17l-5-5",
                book: "M4 19.5A2.5 2.5 0 016.5 17H20M4 19.5A2.5 2.5 0 006.5 22H20M4 19.5V3a1 1 0 011-1h15a1 1 0 011 1v19a1 1 0 01-1 1H6.5a2.5 2.5 0 01-2.5-2.5z",
                dices: "M3 3h7v7H3z M14 3h7v7h-7z M3 14h7v7H3z M14 14h7v7h-7z",
                arrowLeft: "M15 19l-7-7 7-7",
                arrowRight: "M9 5l7 7-7 7"
            };
            return (
                <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <path d={paths[name]} />
                </svg>
            );
        };

        const getMysteryForToday = () => {
            const day = new Date().getDay(); 
            switch(day) {
                case 1: case 6: return 'veseli';
                case 2: case 5: return 'zalostni';
                case 4: return 'svetli';
                case 3: case 0: default: return 'castitljivi';
            }
        };

        function App() {
            const [lang, setLang] = useState('sl');
            const [isRoulettePrayer, setIsRoulettePrayer] = useState(false);
            const [isRouletteDecade, setIsRouletteDecade] = useState(false);
            const [mysteryType, setMysteryType] = useState(getMysteryForToday());
            const [decadeIndex, setDecadeIndex] = useState(0); 
            const [step, setStep] = useState(-1); 
            const [savedStep, setSavedStep] = useState(0); 

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (step >= 0 && step < 13) {
                        if (e.key === 'ArrowRight' || e.key === ' ') {
                            e.preventDefault();
                            handleNextStep();
                        } else if (e.key === 'ArrowLeft') {
                            e.preventDefault();
                            handlePrevStep();
                        }
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [step, decadeIndex, lang, isRoulettePrayer, isRouletteDecade]);

            const currentMysteryText = MYSTERIES[mysteryType][lang][decadeIndex];
            const isInsertLanguage = lang === 'sl' || lang === 'de';

            const changeLanguageRandomly = useCallback(() => {
                setLang(currentLang => {
                    const langs = ['sl', 'de', 'en', 'it', 'la'];
                    const availableLangs = langs.filter(l => l !== currentLang);
                    return availableLangs[Math.floor(Math.random() * availableLangs.length)];
                });
            }, []);

            const handleNextStep = useCallback(() => {
                if (isRoulettePrayer) {
                    changeLanguageRandomly();
                }

                if (step < 12) {
                    setStep(prev => prev + 1);
                } else if (step === 12) {
                    if (decadeIndex < 4) {
                        if (isRouletteDecade && !isRoulettePrayer) {
                            changeLanguageRandomly();
                        }
                        setDecadeIndex(prev => prev + 1);
                        setStep(0);
                    } else {
                        setStep(13); 
                    }
                }
            }, [step, decadeIndex, isRoulettePrayer, isRouletteDecade, changeLanguageRandomly]);

            const handlePrevStep = useCallback(() => {
                if (step > 0) {
                    setStep(prev => prev - 1);
                } else if (step === 0 && decadeIndex > 0) {
                    setDecadeIndex(prev => prev - 1);
                    setStep(12);
                } else if (step === 0 && decadeIndex === 0) {
                    setSavedStep(0);
                    setStep(-1);
                }
            }, [step, decadeIndex]);

            // Prikaz glavnega menija
            const renderMainMenu = () => (
                <div className="flex flex-col items-center py-6 px-4 space-y-6 animate-slide-up w-full max-w-sm mx-auto">
                    
                    {/* SVETA UMETNOST (Slika na vrhu) */}
                    <div className="relative w-48 h-48 md:w-56 md:h-56 mx-auto shadow-[0_15px_30px_rgba(0,0,0,0.25)] rounded-full border-[6px] border-[#d4af37] overflow-hidden bg-[#121c33] flex items-center justify-center">
                        {HOLY_ART_IMAGE ? (
                            <img src={HOLY_ART_IMAGE} alt="Holy Art" className="w-full h-full object-cover" />
                        ) : (
                            <div className="flex flex-col items-center justify-center w-full h-full bg-gradient-to-br from-[#1a294c] to-[#0a0f1c]">
                                <span className="text-6xl md:text-7xl text-[#d4af37] drop-shadow-md font-serif-holy mb-2">✟</span>
                                <span className="text-[10px] md:text-[11px] text-[#d4af37] font-bold tracking-[0.3em] uppercase opacity-90">Ave Maria</span>
                            </div>
                        )}
                        <div className="absolute inset-0 rounded-full shadow-[inset_0_0_20px_rgba(0,0,0,0.6)] pointer-events-none"></div>
                    </div>

                    <div className="text-center">
                        <h2 className="text-3xl font-serif-holy font-bold text-[#121c33] tracking-wide mb-1">Nastavitve</h2>
                        <p className="text-[#8b1a1a] font-medium text-sm italic">Pripravi se na zbrano molitev</p>
                    </div>

                    {/* Nastavitve (Meni kartica) */}
                    <div className="w-full space-y-4 bg-[#fcfaf5] p-6 rounded-2xl shadow-lg border border-[#e8dfc8] relative">
                        <div className="space-y-1.5">
                            <label className="text-[10px] font-bold text-[#8b1a1a] uppercase tracking-widest ml-1 opacity-90">Jezik</label>
                            <div className="relative">
                                <select 
                                    className="w-full bg-[#f6f3eb] border border-[#d2c5aa] text-[#2c1810] p-3.5 rounded-xl font-bold outline-none appearance-none focus:border-[#d4af37] focus:ring-2 focus:ring-[#d4af37]/30 transition-all cursor-pointer shadow-sm"
                                    value={lang}
                                    onChange={(e) => setLang(e.target.value)}
                                >
                                    <option value="sl">🇸🇮 SLOVENŠČINA</option>
                                    <option value="de">🇩🇪 DEUTSCH</option>
                                    <option value="en">🇬🇧 ENGLISH</option>
                                    <option value="it">🇮🇹 ITALIANO</option>
                                    <option value="la">🇻🇦 LATINA</option>
                                </select>
                                <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-[#8b1a1a]">
                                    <Icon name="arrowRight" className="w-4 h-4 rotate-90" />
                                </div>
                            </div>
                        </div>

                        <div className="space-y-1.5">
                            <label className="text-[10px] font-bold text-[#8b1a1a] uppercase tracking-widest ml-1 opacity-90">Skrivnosti (Za danes)</label>
                            <div className="relative">
                                <select 
                                    className="w-full bg-[#f6f3eb] border border-[#d2c5aa] text-[#2c1810] p-3.5 rounded-xl font-bold outline-none appearance-none focus:border-[#d4af37] focus:ring-2 focus:ring-[#d4af37]/30 transition-all cursor-pointer shadow-sm"
                                    value={mysteryType}
                                    onChange={(e) => setMysteryType(e.target.value)}
                                >
                                    {Object.entries(MYSTERY_NAMES).map(([key, name]) => (
                                        <option key={key} value={key}>{name.toUpperCase()}</option>
                                    ))}
                                </select>
                                <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-[#8b1a1a]">
                                    <Icon name="arrowRight" className="w-4 h-4 rotate-90" />
                                </div>
                            </div>
                        </div>

                        <div className="pt-2 space-y-2">
                            <button
                                onClick={() => {
                                    setIsRoulettePrayer(!isRoulettePrayer);
                                    if (!isRoulettePrayer) setIsRouletteDecade(false); // Prepreči aktivacijo obeh
                                }}
                                className={`w-full flex items-center justify-between p-3.5 rounded-xl font-black text-[10px] md:text-xs transition-all duration-300 border ${
                                    isRoulettePrayer 
                                    ? 'bg-[#d4af37] border-[#b8952a] text-white shadow-md' 
                                    : 'bg-transparent border-[#d2c5aa] text-[#6d5a42] hover:bg-[#f6f3eb]'
                                }`}
                            >
                                <div className="flex items-center gap-2 md:gap-3">
                                    <Icon name="dices" className={isRoulettePrayer ? "text-white" : "text-[#8b1a1a]"} />
                                    RULETA: VSAKA MOLITEV
                                </div>
                                <div className={`w-10 h-6 rounded-full relative transition-colors duration-300 shadow-inner ${isRoulettePrayer ? 'bg-[#121c33]' : 'bg-[#d2c5aa]'}`}>
                                    <div className={`absolute top-1 w-4 h-4 bg-white rounded-full transition-all duration-300 shadow-sm ${isRoulettePrayer ? 'left-5' : 'left-1'}`} />
                                </div>
                            </button>

                            <button
                                onClick={() => {
                                    setIsRouletteDecade(!isRouletteDecade);
                                    if (!isRouletteDecade) setIsRoulettePrayer(false); // Prepreči aktivacijo obeh
                                }}
                                className={`w-full flex items-center justify-between p-3.5 rounded-xl font-black text-[10px] md:text-xs transition-all duration-300 border ${
                                    isRouletteDecade 
                                    ? 'bg-[#d4af37] border-[#b8952a] text-white shadow-md' 
                                    : 'bg-transparent border-[#d2c5aa] text-[#6d5a42] hover:bg-[#f6f3eb]'
                                }`}
                            >
                                <div className="flex items-center gap-2 md:gap-3">
                                    <Icon name="dices" className={isRouletteDecade ? "text-white" : "text-[#8b1a1a]"} />
                                    RULETA: VSAKA DESETKA
                                </div>
                                <div className={`w-10 h-6 rounded-full relative transition-colors duration-300 shadow-inner ${isRouletteDecade ? 'bg-[#121c33]' : 'bg-[#d2c5aa]'}`}>
                                    <div className={`absolute top-1 w-4 h-4 bg-white rounded-full transition-all duration-300 shadow-sm ${isRouletteDecade ? 'left-5' : 'left-1'}`} />
                                </div>
                            </button>
                        </div>
                    </div>

                    <div className="w-full flex flex-col gap-3 mt-2">
                        <button 
                            onClick={() => {
                                if (savedStep === 0 && decadeIndex === 0 && step === -1 && (isRoulettePrayer || isRouletteDecade)) {
                                    changeLanguageRandomly(); // Spremeni jezik takoj na začetku, če je ruleta vklopljena
                                }
                                setStep(savedStep);
                            }}
                            className="group bg-gradient-to-b from-[#8b1a1a] to-[#5c0e0e] hover:from-[#a01e1e] hover:to-[#731212] text-[#f4e0aa] w-full py-4 rounded-xl font-serif-holy font-bold text-xl shadow-lg transition-all active:scale-95 flex items-center justify-center border-b-4 border-[#3e0808]"
                        >
                            <div className="mr-3 transform group-hover:scale-110 transition-transform"><Icon name="play" /></div>
                            {(decadeIndex > 0 || savedStep > 0) ? "NADALJUJ MOLITEV" : "ZAČNI MOLITEV"}
                        </button>
                        
                        {(decadeIndex > 0 || savedStep > 0) && (
                            <button 
                                onClick={() => { setDecadeIndex(0); setSavedStep(0); setStep(0); }}
                                className="group bg-transparent hover:bg-[#e8dfc8] text-[#3e2723] w-full py-3 rounded-xl font-bold text-xs shadow-sm transition-all active:scale-95 flex items-center justify-center border border-[#d2c5aa]"
                            >
                                <div className="mr-2 transform group-hover:-rotate-180 transition-transform duration-500"><Icon name="refresh" className="w-4 h-4" /></div>
                                ZAČNI OD ZAČETKA
                            </button>
                        )}
                    </div>
                </div>
            );

            // Prikaz same molitve
            const renderPrayerContent = () => {
                const p = PRAYERS[lang];

                if (step === 13) {
                    return (
                        <div className="text-center py-12 px-6 animate-slide-up flex flex-col justify-center h-full">
                            <div className="w-24 h-24 bg-[#121c33] rounded-full flex items-center justify-center mx-auto mb-6 shadow-xl border-[4px] border-[#d4af37] text-[#d4af37]">
                                <Icon name="check" className="w-12 h-12" />
                            </div>
                            <h2 className="text-4xl font-serif-holy font-bold text-[#8b1a1a] mb-3 uppercase tracking-tight">Bog bodi zahvaljen!</h2>
                            <p className="text-[#3e2723] mb-10 text-lg font-medium italic">Vseh pet desetk je zaključenih.</p>
                            <button 
                                onClick={() => { setStep(-1); setSavedStep(0); setDecadeIndex(0); }}
                                className="group bg-gradient-to-b from-[#121c33] to-[#0a0f1c] hover:from-[#1a294c] hover:to-[#121c33] text-[#d4af37] w-full max-w-xs py-4 rounded-xl font-serif-holy font-bold text-lg shadow-lg transition flex items-center justify-center mx-auto border-b-4 border-[#000]"
                            >
                                <div className="mr-3 transform group-hover:rotate-180 transition-transform duration-500"><Icon name="refresh" /></div>
                                MENI / PONOVNO
                            </button>
                        </div>
                    );
                }

                let title = "";
                let content = null;
                let subtitle = "";

                // Oblikovanje podnaslova
                if (isInsertLanguage) {
                    subtitle = `${decadeIndex + 1}. SKRIVNOST`;
                } else {
                    subtitle = `${decadeIndex + 1}. MYSTERY: ${currentMysteryText}`;
                    if (lang === 'it') subtitle = `${decadeIndex + 1}° MISTERO: ${currentMysteryText}`;
                    if (lang === 'la') subtitle = `MYSTERIUM ${decadeIndex + 1}: ${currentMysteryText}`;
                }

                // Določanje vsebine
                if (step === 0) {
                    title = p.ocenasTitle;
                    content = <p className="text-base md:text-lg leading-relaxed font-serif-holy font-semibold text-[#2c1810]">{p.ocenas}</p>;
                } else if (step >= 1 && step <= 10) {
                    title = `${p.zdravaTitle} (${step}/10)`;
                    content = (
                        <p className="text-base md:text-lg leading-relaxed font-serif-holy font-semibold text-[#2c1810]">
                            {p.zdrava1}
                            {isInsertLanguage && <span className="text-[#8b1a1a] bg-[#fcfaf5] px-1 rounded mx-1 underline decoration-[#d4af37] decoration-2 underline-offset-4 font-bold">{currentMysteryText}</span>}
                            {p.zdrava2}
                        </p>
                    );
                } else if (step === 11) {
                    title = p.slavaTitle;
                    content = <p className="text-base md:text-lg leading-relaxed font-serif-holy font-semibold text-[#2c1810]">{p.slava}</p>;
                } else if (step === 12) {
                    title = p.fatimaTitle;
                    content = <p className="text-base md:text-lg leading-relaxed font-serif-holy font-semibold text-[#2c1810]">{p.fatima}</p>;
                }

                return (
                    <div className="flex flex-col h-full animate-fade-in w-full">
                        
                        {/* KOMPAKTEN ZGORNJI DEL: Domov + Napredek v eni vrstici */}
                        <div className="w-full flex justify-between items-center mb-3 mt-1">
                            {/* Gumb Meni / Domov */}
                            <button 
                                onClick={() => { setSavedStep(step); setStep(-1); }}
                                className="w-10 h-10 bg-[#fcfaf5] rounded-full shadow-sm flex items-center justify-center text-[#8b1a1a] hover:text-[#121c33] transform transition-all active:scale-90 border border-[#d2c5aa] flex-shrink-0"
                                aria-label="Nazaj na meni"
                            >
                                <Icon name="book" className="w-5 h-5" />
                            </button>

                            {/* Tradicionalen napredek */}
                            <div className="flex flex-col items-center gap-1.5">
                                {/* Desetke */}
                                <div className="flex gap-1.5">
                                    {[0, 1, 2, 3, 4].map(i => (
                                        <div key={`d-${i}`} className={`h-1.5 rounded-sm transition-all duration-500 ${
                                            i === decadeIndex ? 'w-6 bg-[#8b1a1a] shadow-sm' : 
                                            i < decadeIndex ? 'w-3 bg-[#d4af37]' : 'w-3 bg-[#d2c5aa]/60'
                                        }`} />
                                    ))}
                                </div>
                                
                                {/* Jagode */}
                                <div className="flex gap-1 items-center">
                                    {Array.from({ length: 13 }).map((_, i) => {
                                        const isLarge = i === 0 || i === 11 || i === 12;
                                        return (
                                            <div 
                                                key={`b-${i}`} 
                                                className={`rounded-full transition-all duration-300 ${
                                                    isLarge ? 'w-1.5 h-1.5' : 'w-1 h-1'
                                                } ${
                                                    i === step ? 'bg-[#121c33] ring-1 ring-[#d4af37] ring-offset-1 ring-offset-[#f6f3eb] scale-125' : 
                                                    i < step ? 'bg-[#8b1a1a]/60' : 'bg-[#d2c5aa]'
                                                }`}
                                            />
                                        );
                                    })}
                                </div>
                            </div>

                            {/* Neviden placeholder */}
                            <div className="w-10 h-10 flex-shrink-0"></div>
                        </div>

                        {/* Navigacijski gumbi - JAGODA IN NAZAJ */}
                        <div className="flex justify-center items-center gap-5 mb-4">
                            <button 
                                onClick={handlePrevStep}
                                className="w-10 h-10 bg-[#fcfaf5] rounded-full shadow-sm flex items-center justify-center text-[#6d5a42] hover:text-[#8b1a1a] transform transition-all active:scale-90 border border-[#d2c5aa] flex-shrink-0"
                                aria-label="Nazaj"
                            >
                                <Icon name="arrowLeft" className="w-5 h-5" />
                            </button>

                            {/* GLAVNI GUMB NAPREJ (Jagoda / Slika) */}
                            <button 
                                onClick={handleNextStep}
                                className="w-20 h-20 md:w-24 md:h-24 rounded-full shadow-[0_10px_20px_rgba(0,0,0,0.2)] flex items-center justify-center text-[#d4af37] transform transition-all active:scale-95 border-[4px] border-[#d4af37] group z-10 flex-shrink-0 relative overflow-hidden bg-gradient-to-br from-[#8b1a1a] to-[#4a0e0e]"
                            >
                                {CUSTOM_BEAD_IMAGE ? (
                                    <img src={CUSTOM_BEAD_IMAGE} alt="Naprej" className="absolute inset-0 w-full h-full object-cover rounded-full" />
                                ) : (
                                    <span className="text-4xl md:text-5xl drop-shadow-md group-hover:scale-110 group-active:scale-90 transition-transform duration-300 font-serif-holy relative z-10">✟</span>
                                )}
                                {/* Overlay za gumb s sliko, da malo potemni ob hoverju (opcijsko) */}
                                {CUSTOM_BEAD_IMAGE && <div className="absolute inset-0 bg-black/10 group-active:bg-black/30 transition-colors pointer-events-none rounded-full"></div>}
                            </button>
                            
                            {/* Spacer */}
                            <div className="w-10 h-10 flex-shrink-0"></div>
                        </div>
                        
                        {/* KARTICA Z MOLITVIJO */}
                        <div className="bg-[#fdfbf7] rounded-xl p-5 md:p-8 pt-6 md:pt-8 shadow-xl border border-[#d4af37]/40 relative overflow-hidden flex-grow flex flex-col justify-start">
                            {/* Ornamentalen kot ali vzorec (subtilno) */}
                            <div className="absolute top-0 right-0 w-16 h-16 border-t-4 border-r-4 border-[#d4af37]/20 rounded-tr-xl m-2 pointer-events-none"></div>
                            <div className="absolute bottom-0 left-0 w-16 h-16 border-b-4 border-l-4 border-[#d4af37]/20 rounded-bl-xl m-2 pointer-events-none"></div>

                            <div className="text-center mb-4 flex flex-col items-center relative z-10">
                                <span className="px-3 py-1 bg-[#121c33] text-[#d4af37] rounded-sm text-[9px] font-bold mb-3 uppercase tracking-[0.2em] shadow-sm">
                                    {subtitle}
                                </span>
                                <h2 className="text-2xl md:text-3xl font-serif-holy font-bold text-[#8b1a1a] uppercase tracking-tight drop-shadow-sm">{title}</h2>
                            </div>
                            
                            <div className="block text-center relative z-10 mt-1">
                                <div className="animate-fade-in" key={`${decadeIndex}-${step}-${lang}`}>
                                    {content}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className={`min-h-screen flex flex-col items-center ${step === -1 ? 'pb-12' : 'pb-4'}`}>
                    {/* GLAVA / HEADER - Vidna samo v meniju */}
                    {step === -1 && (
                        <div className="w-full bg-[#121c33] text-[#d4af37] p-4 flex items-center justify-center border-b-[4px] border-[#d4af37] sticky top-0 z-50 shadow-lg">
                            <span className="text-xl md:text-2xl font-serif-holy font-bold flex items-center tracking-widest uppercase">
                                <span className="text-2xl mr-2 text-[#f6f3eb]">✟</span> ROŽNI VENEC
                            </span>
                        </div>
                    )}

                    <div className={`w-full max-w-lg flex flex-col px-4 md:px-6 ${step === -1 ? 'mt-4 md:mt-6' : 'mt-2 h-[95vh]'}`}>
                        
                        {/* GLAVNA VSEBINA */}
                        {step === -1 ? renderMainMenu() : renderPrayerContent()}

                    </div>

                    {/* NOGA / FOOTER - Vidna samo v meniju */}
                    {step === -1 && (
                        <div className="mt-auto pt-8 px-8 text-[#8b1a1a] text-[10px] font-bold text-center uppercase tracking-[0.3em] opacity-70 leading-loose">
                            Ave Maria ✟ Gratia Plena<br/>
                            Dominus Tecum
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
